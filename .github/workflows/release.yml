# =============================================================================
# NAILS OS Release Workflow
# =============================================================================
#
# Creates a GitHub Release for NAILS OS with ISO artifacts, checksums,
# build provenance attestation, and reproducibility verification results.
#
# Triggers:
#   - Manual dispatch with tag/release name inputs
#   - Automatic on version tag push (v*)
#
# This workflow calls build-iso.yml as a reusable workflow, then packages
# the resulting artifacts into a signed GitHub Release.
# =============================================================================

name: Release NAILS OS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Release name (e.g., NAILS OS v0.1.0)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

# ---------------------------------------------------------------------------
# Top-level permissions are intentionally empty (least privilege).
# Each job declares only the permissions it needs.
# ---------------------------------------------------------------------------
permissions: {}

# ---------------------------------------------------------------------------
# Only one release pipeline should run at a time. Never cancel an in-progress
# release — it may have already uploaded partial assets.
# ---------------------------------------------------------------------------
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Job 1: Build ISO via the reusable build-iso workflow
  # ===========================================================================
  build:
    name: Build ISO
    uses: ./.github/workflows/build-iso.yml
    # Grant the permissions that build-iso.yml's jobs declare:
    #   - contents: read  (top-level default in build-iso.yml)
    #   - contents: write (publish-latest job in build-iso.yml)
    # The caller must grant the union of all permissions the callee may use.
    # publish-latest only runs on push-to-main (not on workflow_call), but
    # GitHub validates declared permissions at parse time regardless of `if`.
    permissions:
      contents: write
    with:
      verify_reproducibility: true
      r2_prefix: "stable"
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  # ===========================================================================
  # Job 2: Create GitHub Release with artifacts and attestation
  # ===========================================================================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # Create releases and tags
      id-token: write        # OIDC token for attestation signing
      attestations: write    # Publish attestation to GitHub

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout — required for `gh` CLI repository context
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # -----------------------------------------------------------------------
      # 2. Reconstruct metadata files from workflow_call outputs.
      # The files are passed directly through job outputs instead of GitHub
      # artifact storage, which was unreliable across workflow boundaries.
      # -----------------------------------------------------------------------
      - name: Decode build metadata
        env:
          CHECKSUMS_B64: ${{ needs.build.outputs.checksums_content }}
          BUILD_METADATA_B64: ${{ needs.build.outputs.build_metadata_content }}
        run: |
          mkdir -p dist
          # Outputs are base64-encoded to safely transport multiline content
          # through GitHub Actions workflow outputs without EOF delimiter collisions
          echo "$CHECKSUMS_B64" | base64 --decode > dist/checksums.txt
          echo "$BUILD_METADATA_B64" | base64 --decode > dist/build-metadata.json

      - name: Validate metadata files
        run: |
          echo "--- Reconstructed artifacts ---"
          ls -la dist/
          echo ""

          # Ensure required metadata files are present and non-empty
          for file in checksums.txt build-metadata.json; do
            if [ ! -f "dist/${file}" ]; then
              echo "::error::Missing required artifact: ${file}"
              exit 1
            fi
            if [ ! -s "dist/${file}" ]; then
              echo "::error::Artifact is empty: ${file}"
              exit 1
            fi
          done

          echo "All required artifacts present and non-empty."
          echo ""
          echo "--- checksums.txt ---"
          cat dist/checksums.txt
          echo ""
          echo "--- build-metadata.json ---"
          cat dist/build-metadata.json

      # -----------------------------------------------------------------------
      # 2b. Fetch security artifacts from R2 when available.
      # If not available, generate a pointer manifest to keep release flow robust.
      # -----------------------------------------------------------------------
      - name: Fetch security artifacts from R2 (best effort)
        env:
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          R2_SBOM_NAME: ${{ needs.build.outputs.r2_sbom_name }}
          R2_VULN_REPORT_NAME: ${{ needs.build.outputs.r2_vuln_report_name }}
          R2_SBOM_UPLOADED: ${{ needs.build.outputs.r2_sbom_uploaded }}
          R2_VULN_UPLOADED: ${{ needs.build.outputs.r2_vuln_uploaded }}
          VULN_SUMMARY: ${{ needs.build.outputs.vulnerability_summary }}
        run: |
          set -euo pipefail
          mkdir -p dist

          SBOM_LOCAL=""
          VULN_LOCAL=""

          if [ -n "${R2_PUBLIC_URL:-}" ] && [ "${R2_SBOM_UPLOADED:-false}" = "true" ] && [ -n "${R2_SBOM_NAME:-}" ]; then
            if curl -fsSL "${R2_PUBLIC_URL}/stable/security/${R2_SBOM_NAME}" -o "dist/${R2_SBOM_NAME}"; then
              SBOM_LOCAL="dist/${R2_SBOM_NAME}"
            else
              echo "::warning::Failed to download SBOM from R2"
            fi
          fi

          if [ -n "${R2_PUBLIC_URL:-}" ] && [ "${R2_VULN_UPLOADED:-false}" = "true" ] && [ -n "${R2_VULN_REPORT_NAME:-}" ]; then
            if curl -fsSL "${R2_PUBLIC_URL}/stable/security/${R2_VULN_REPORT_NAME}" -o "dist/${R2_VULN_REPORT_NAME}"; then
              VULN_LOCAL="dist/${R2_VULN_REPORT_NAME}"
            else
              echo "::warning::Failed to download vulnerability report from R2"
            fi
          fi

          {
            echo "Security artifact references"
            echo "============================"
            echo "Vulnerability summary: ${VULN_SUMMARY:-unknown}"
            echo ""
            if [ -n "${R2_PUBLIC_URL:-}" ] && [ -n "${R2_SBOM_NAME:-}" ]; then
              echo "SBOM URL: ${R2_PUBLIC_URL}/stable/security/${R2_SBOM_NAME}"
            else
              echo "SBOM URL: unavailable"
            fi
            if [ -n "${R2_PUBLIC_URL:-}" ] && [ -n "${R2_VULN_REPORT_NAME:-}" ]; then
              echo "Vulnerability report URL: ${R2_PUBLIC_URL}/stable/security/${R2_VULN_REPORT_NAME}"
            else
              echo "Vulnerability report URL: unavailable"
            fi
          } > dist/security-artifacts.txt

          echo "sbom_local=${SBOM_LOCAL}" >> "$GITHUB_OUTPUT"
          echo "vuln_local=${VULN_LOCAL}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Determine release metadata from trigger context
      # -----------------------------------------------------------------------
      - name: Determine release metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          # --- Tag ---
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            # Tag push: github.ref_name is the tag (e.g. v0.1.0)
            TAG="${REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # --- Version (strip leading 'v') ---
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # --- Release name ---
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_RELEASE_NAME}" ]; then
            RELEASE_NAME="${INPUT_RELEASE_NAME}"
          else
            RELEASE_NAME="NAILS OS ${TAG}"
          fi
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

          # --- Pre-release flag ---
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            PRERELEASE="${INPUT_PRERELEASE}"
          else
            # Auto-detect pre-release from tag pattern (e.g. v0.1.0-rc1, v0.1.0-alpha)
            if echo "${TAG}" | grep -qE '-(alpha|beta|rc|dev|preview)'; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

          # --- Extract build metadata for release notes ---
          if [ -f dist/build-metadata.json ]; then
            COMMIT_SHA=$(jq -r '.git.commit // "unknown"' dist/build-metadata.json)
            BUILD_DATE=$(jq -r '.build.timestamp // "unknown"' dist/build-metadata.json)
            NIX_VERSION=$(jq -r '.build.nix_version // "unknown"' dist/build-metadata.json)
            NIXPKGS_REV=$(jq -r '.nixpkgs.revision // "unknown"' dist/build-metadata.json)
            REPRODUCIBLE=$(jq -r '.reproducibility.l2_full_rebuild // .reproducibility.l1_same_store // "unknown"' dist/build-metadata.json)
          else
            COMMIT_SHA="${GIT_SHA}"
            BUILD_DATE="unknown"
            NIX_VERSION="unknown"
            NIXPKGS_REV="unknown"
            REPRODUCIBLE="unknown"
          fi

          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "nix_version=${NIX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "nixpkgs_rev=${NIXPKGS_REV}" >> "$GITHUB_OUTPUT"
          echo "reproducible=${REPRODUCIBLE}" >> "$GITHUB_OUTPUT"

          # --- Read checksums.txt for inclusion in release notes ---
          CHECKSUMS_CONTENT=$(cat dist/checksums.txt)
          # Use heredoc delimiter for multi-line output
          {
            echo "sha256sums<<EOFSHA"
            echo "${CHECKSUMS_CONTENT}"
            echo "EOFSHA"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Release ${RELEASE_NAME} (${TAG}) — prerelease=${PRERELEASE}, reproducible=${REPRODUCIBLE}"

      # -----------------------------------------------------------------------
      # 3b. Compute dependency diff from flake.lock between previous and current
      # tag. Gracefully handles first-release/no-previous-tag scenarios.
      # -----------------------------------------------------------------------
      - name: Generate dependency diff (flake.lock)
        id: depdiff
        env:
          CURRENT_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          git fetch --force --tags

          python3 - << 'PYEOF'
          import json
          import os
          import subprocess

          current_tag = os.environ["CURRENT_TAG"]

          def run(*args):
              return subprocess.check_output(args, text=True).strip()

          try:
              tags = run("git", "tag", "--list", "v*", "--sort=-creatordate").splitlines()
          except subprocess.CalledProcessError:
              tags = []

          prev_tag = ""
          for t in tags:
              if t and t != current_tag:
                  prev_tag = t
                  break

          def load_lock_from_git(ref):
              try:
                  content = run("git", "show", f"{ref}:nix-config/flake.lock")
                  return json.loads(content)
              except Exception:
                  return None

          def load_current_lock():
              try:
                  with open("nix-config/flake.lock", "r", encoding="utf-8") as f:
                      return json.load(f)
              except Exception:
                  return None

          def normalize(lock):
              out = {}
              if not lock:
                  return out
              for name, node in (lock.get("nodes") or {}).items():
                  locked = node.get("locked") or {}
                  original = node.get("original") or {}
                  if not locked:
                      continue
                  ref = locked.get("rev") or locked.get("narHash") or str(locked.get("lastModified", "unknown"))
                  source = "/".join(
                      p for p in [
                          original.get("type"),
                          original.get("owner"),
                          original.get("repo"),
                      ]
                      if p
                  ) or "unknown"
                  out[name] = {"ref": ref, "source": source}
              return out

          current = normalize(load_current_lock())
          if not prev_tag:
              section = "### Dependency Diff\n\n- No previous `v*` tag found (first release).\n"
          else:
              previous = normalize(load_lock_from_git(prev_tag))
              if not previous:
                  section = f"### Dependency Diff\n\n- Could not read `nix-config/flake.lock` from `{prev_tag}`.\n"
              else:
                  added = sorted(set(current) - set(previous))
                  removed = sorted(set(previous) - set(current))
                  changed = sorted(
                      n for n in (set(current) & set(previous))
                      if current[n]["ref"] != previous[n]["ref"]
                  )

                  lines = [
                      "### Dependency Diff",
                      "",
                      f"Compared `flake.lock` between `{prev_tag}` and `{current_tag}`.",
                      "",
                      f"- Added inputs: {len(added)}",
                      f"- Removed inputs: {len(removed)}",
                      f"- Updated inputs: {len(changed)}",
                      "",
                  ]

                  if changed:
                      lines.append("#### Updated inputs")
                      for name in changed[:30]:
                          lines.append(
                              f"- `{name}`: `{previous[name]['ref']}` → `{current[name]['ref']}`"
                          )
                      if len(changed) > 30:
                          lines.append(f"- _... and {len(changed) - 30} more updates_")
                      lines.append("")

                  if added:
                      lines.append("#### Added inputs")
                      for name in added[:20]:
                          lines.append(f"- `{name}` ({current[name]['source']})")
                      if len(added) > 20:
                          lines.append(f"- _... and {len(added) - 20} more additions_")
                      lines.append("")

                  if removed:
                      lines.append("#### Removed inputs")
                      for name in removed[:20]:
                          lines.append(f"- `{name}` ({previous[name]['source']})")
                      if len(removed) > 20:
                          lines.append(f"- _... and {len(removed) - 20} more removals_")
                      lines.append("")

                  section = "\n".join(lines)

          with open("dist/dependency-diff.md", "w", encoding="utf-8") as f:
              f.write(section)
          print(section)
          PYEOF

          {
            echo "section<<EOF"
            cat dist/dependency-diff.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 4. Check repository visibility
      # -----------------------------------------------------------------------
      - name: Check repository visibility
        id: repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VISIBILITY=$(gh api "repos/${{ github.repository }}" --jq '.visibility')
          echo "visibility=${VISIBILITY}" >> "$GITHUB_OUTPUT"

          if [ "${VISIBILITY}" = "public" ]; then
            echo "is_public=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Repository is public — attestation will be created."
          else
            echo "is_public=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Repository is ${VISIBILITY} — skipping attestation (requires public repo)."
          fi

      # -----------------------------------------------------------------------
      # 5. Create build provenance attestation (public repos only)
      #    Attests the checksums.txt file, which is cryptographically tied to the
      #    ISO (the ISO's checksum is inside it). The ISO itself is on R2 and
      #    is not available in this runner's workspace.
      # -----------------------------------------------------------------------
      - name: Create artifact attestation
        if: steps.repo.outputs.is_public == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/checksums.txt

      # -----------------------------------------------------------------------
      # 6. Generate release notes body
      # -----------------------------------------------------------------------
      - name: Validate R2 outputs
        env:
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          R2_ISO_NAME: ${{ needs.build.outputs.r2_iso_name }}
          R2_UPLOADED: ${{ needs.build.outputs.r2_uploaded }}
        run: |
          set -euo pipefail
          echo "R2_UPLOADED=${R2_UPLOADED:-<empty>}"
          echo "R2_ISO_NAME=${R2_ISO_NAME:-<empty>}"
          echo "R2_PUBLIC_URL=${R2_PUBLIC_URL:+set (redacted)}"
          if [ "${R2_UPLOADED}" != "true" ]; then
            echo "::error::Stable release publication requires R2 upload output 'true'."
            exit 1
          fi
          if [ -z "${R2_ISO_NAME}" ]; then
            echo "::error::Stable release publication requires a non-empty R2 ISO output name."
            exit 1
          fi
          if [ -z "${R2_PUBLIC_URL:-}" ]; then
            echo "::error::Stable release publication requires R2_PUBLIC_URL to generate the published download link."
            exit 1
          fi

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          NIX_VERSION: ${{ steps.meta.outputs.nix_version }}
          NIXPKGS_REV: ${{ steps.meta.outputs.nixpkgs_rev }}
          REPRO_STATUS: ${{ steps.meta.outputs.reproducible }}
          CHECKSUMS: ${{ steps.meta.outputs.sha256sums }}
          IS_PUBLIC: ${{ steps.repo.outputs.is_public }}
          REPOSITORY: ${{ github.repository }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          R2_ISO_NAME: ${{ needs.build.outputs.r2_iso_name }}
          R2_UPLOADED: ${{ needs.build.outputs.r2_uploaded }}
          R2_SBOM_NAME: ${{ needs.build.outputs.r2_sbom_name }}
          R2_VULN_REPORT_NAME: ${{ needs.build.outputs.r2_vuln_report_name }}
          R2_SBOM_UPLOADED: ${{ needs.build.outputs.r2_sbom_uploaded }}
          R2_VULN_UPLOADED: ${{ needs.build.outputs.r2_vuln_uploaded }}
          VULN_SUMMARY: ${{ needs.build.outputs.vulnerability_summary }}
          DEPENDENCY_DIFF_SECTION: ${{ steps.depdiff.outputs.section }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          tag = os.environ["TAG"]
          commit_sha = os.environ["COMMIT_SHA"]
          commit_short = commit_sha[:7]
          build_date = os.environ["BUILD_DATE"]
          nix_version = os.environ["NIX_VERSION"]
          nixpkgs_rev = os.environ["NIXPKGS_REV"]
          repro_status = os.environ["REPRO_STATUS"]
          checksums = os.environ["CHECKSUMS"]
          is_public = os.environ["IS_PUBLIC"]
          repository = os.environ["REPOSITORY"]
          r2_public_url = os.environ.get("R2_PUBLIC_URL", "")
          r2_iso_name = os.environ.get("R2_ISO_NAME", "")
          r2_uploaded = os.environ.get("R2_UPLOADED", "false")
          r2_sbom_name = os.environ.get("R2_SBOM_NAME", "")
          r2_vuln_name = os.environ.get("R2_VULN_REPORT_NAME", "")
          r2_sbom_uploaded = os.environ.get("R2_SBOM_UPLOADED", "false")
          r2_vuln_uploaded = os.environ.get("R2_VULN_UPLOADED", "false")
          vuln_summary = os.environ.get("VULN_SUMMARY", "unknown")
          dep_diff_section = os.environ.get("DEPENDENCY_DIFF_SECTION", "### Dependency Diff\n\n- Unavailable.\n")

          if repro_status == "true":
              repro_badge = "Reproducible build verified"
          elif repro_status == "false":
              repro_badge = "Reproducibility verification failed"
          else:
              repro_badge = "Reproducibility status unknown"

          if r2_public_url and r2_iso_name:
              download_link = f"[**Download {r2_iso_name}**]({r2_public_url}/stable/{r2_iso_name})"
          else:
              download_link = "> ISO download hosted externally. Check project page for download links."

          if r2_public_url and r2_sbom_name and r2_sbom_uploaded == "true":
              sbom_link = f"[SBOM (CycloneDX)]({r2_public_url}/stable/security/{r2_sbom_name})"
          else:
              sbom_link = "SBOM reference available in `security-artifacts.txt` asset"

          if r2_public_url and r2_vuln_name and r2_vuln_uploaded == "true":
              vuln_link = f"[Vulnerability report]({r2_public_url}/stable/security/{r2_vuln_name})"
          else:
              vuln_link = "Vulnerability report reference available in `security-artifacts.txt` asset"

          if is_public == "true":
              attestation = f"""### Attestation

          Verify the build attestation (requires [GitHub CLI](https://cli.github.com/)):
          ```bash
          # The attestation covers checksums.txt (which contains the ISO checksum).
          # Download checksums.txt from this release, then:
          gh attestation verify checksums.txt --repo {repository}
          sha256sum -c checksums.txt
          ```"""
          else:
              attestation = """### Attestation

          > Build attestation is only available for public repositories.
          > Verify integrity using the SHA256 checksums below."""

          notes = f"""## NAILS OS {tag}

          Privacy-focused operating system built on NixOS.

          {download_link}

          **Build Info:** {repro_badge} | Built on {build_date} | Commit [`{commit_short}`](https://github.com/{repository}/commit/{commit_sha})

          ### Verification

          Verify the ISO integrity:
          ```bash
          sha256sum -c checksums.txt
          ```

          **SHA256 Checksums:**
          ```
          {checksums}
          ```

          ### Build Provenance

          See `build-metadata.json` for full build provenance information including:
          - Git commit and ref
          - Build server details
          - Nix version and nixpkgs revision
          - Reproducibility verification results

          | Property | Value |
          |---|---|
          | **Commit** | `{commit_sha}` |
          | **Nix version** | `{nix_version}` |
          | **Nixpkgs revision** | `{nixpkgs_rev}` |
          | **Reproducible** | {repro_status} |
          | **Build date** | {build_date} |

          ### Security Artifacts

          - {sbom_link}
          - {vuln_link}
          - Vulnerability summary (build pipeline): `{vuln_summary}`

          {dep_diff_section}

          {attestation}
          """

          # The triple-quoted f-string produces clean markdown since YAML
          # strips the common indentation from the run block.

          with open("release-notes.md", "w") as f:
              f.write(notes)

          print("--- Release Notes ---")
          print(notes)
          PYEOF

      # -----------------------------------------------------------------------
      # 7. Check for existing release (idempotent — never delete)
      # -----------------------------------------------------------------------
      - name: Check for existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "${TAG}" &>/dev/null; then
            echo "::warning::Release ${TAG} already exists — skipping creation."
            RELEASE_URL=$(gh release view "${TAG}" --json url --jq '.url' 2>/dev/null || echo "(URL unavailable)")
            echo "::notice::Existing release: ${RELEASE_URL}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing release for ${TAG} — will create."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # 8. Create the GitHub Release
      # -----------------------------------------------------------------------
      - name: Create release
        if: steps.existing.outputs.exists != 'true'
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          # Build the gh release create command
          GH_ARGS=(
            "${TAG}"
            --title "${RELEASE_NAME}"
            --notes-file release-notes.md
            --target "${TARGET_SHA}"
          )

          if [ "${PRERELEASE}" = "true" ]; then
            GH_ARGS+=(--prerelease)
          fi

          # Attach metadata (ISO is hosted on R2, not on GitHub Releases)
          GH_ARGS+=(
            "dist/checksums.txt"
            "dist/build-metadata.json"
            "dist/security-artifacts.txt"
            "dist/dependency-diff.md"
          )

          # Attach local copies of security artifacts when available.
          [ -f "dist/${{ needs.build.outputs.r2_sbom_name }}" ] && GH_ARGS+=("dist/${{ needs.build.outputs.r2_sbom_name }}")
          [ -f "dist/${{ needs.build.outputs.r2_vuln_report_name }}" ] && GH_ARGS+=("dist/${{ needs.build.outputs.r2_vuln_report_name }}")

          echo "Creating release: gh release create ${GH_ARGS[*]}"
          RELEASE_URL=$(gh release create "${GH_ARGS[@]}")
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Release created at ${RELEASE_URL}"

      # -----------------------------------------------------------------------
      # 9. Write job summary with release details
      # -----------------------------------------------------------------------
      - name: Summarize release
        if: always()
        env:
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          RELEASE_URL: ${{ steps.create_release.outputs.release_url }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          REPRODUCIBLE: ${{ steps.meta.outputs.reproducible }}
          IS_PUBLIC: ${{ steps.repo.outputs.is_public }}
        run: |
          if [ "${IS_PUBLIC}" = "true" ]; then
            ATTEST_STATUS="Created"
          else
            ATTEST_STATUS="Skipped (private repo)"
          fi

          printf '# Release Created\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| | |\n' >> "$GITHUB_STEP_SUMMARY"
          printf '|---|---|\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| **Release** | [%s](%s) |\n' "${RELEASE_NAME}" "${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Tag** | `%s` |\n' "${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Pre-release** | %s |\n' "${PRERELEASE}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Commit** | `%s` |\n' "${COMMIT_SHA}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Reproducible** | %s |\n' "${REPRODUCIBLE}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Attestation** | %s |\n\n' "${ATTEST_STATUS}" >> "$GITHUB_STEP_SUMMARY"
          printf '### Assets\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- ISO hosted on Cloudflare R2\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- `checksums.txt`\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- `build-metadata.json`\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- `security-artifacts.txt`\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- `dependency-diff.md`\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '### Release URL\n%s\n' "${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
