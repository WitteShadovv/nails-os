# =============================================================================
# NAILS OS — ISO Build & Reproducibility Verification Workflow
# =============================================================================
#
# Builds the NAILS OS privacy-focused ISO on ephemeral Hetzner Cloud servers.
# This workflow is the trusted build engine used by release/manual/main wrappers
# and the approved pull_request_target PR wrapper. Untrusted PR code is never
# checked out before approval; once a maintainer approves the `hetzner-pr`
# environment gate, the exact PR head SHA can be built on Hetzner.
#
# Architecture:
#   1. create-runner  — Provisions a Hetzner Cloud server as a self-hosted
#                       GitHub Actions runner with a 9-combo fallback strategy
#                       (3 server types × 3 locations).
#   2. build-and-verify — Builds the ISO, verifies reproducibility (L1 same-store
#                         check + L2 full rebuild comparison), uploads artifacts,
#                         and prepares release metadata on the ephemeral Hetzner
#                         runner using read-only repository permissions.
#   3. delete-runner  — Tears down the Hetzner server. Runs unconditionally to
#                       prevent orphaned (billable) infrastructure.
#
# Reproducibility:
#   - L1 (same-store): `nix-store --realise --check` — always runs, fast.
#   - L2 (full rebuild): Garbage-collects the store, rebuilds from scratch,
#     and compares SHA256 hashes. Runs on main pushes and when explicitly
#     requested via workflow_dispatch/workflow_call. Skipped on PRs by default
#     to save time and cost.
#
# Security notes:
#   - PERSONAL_ACCESS_TOKEN and HCLOUD_TOKEN are required only for trusted
#     provisioning/publication lanes, not for unprivileged PR validation.
#   - accept-flake-config = false prevents untrusted flake configs from
#     altering the Nix daemon configuration.
#   - persist-credentials: false on checkout prevents token leakage.
# =============================================================================

name: Build NAILS OS ISO

on:
  workflow_dispatch:
    inputs:
      verify_reproducibility:
        description: "Run reproducibility verification (doubles build time)"
        required: false
        type: boolean
        default: true
      r2_prefix:
        description: "R2 upload prefix (stable or latest)"
        required: false
        type: string
        default: "latest"
  workflow_call:
    inputs:
      verify_reproducibility:
        description: "Run reproducibility verification"
        required: false
        type: boolean
        default: true
      r2_prefix:
        description: "R2 upload prefix: 'stable' for releases, 'latest' for rolling builds"
        required: false
        type: string
        default: "latest"
      checkout_repository:
        description: "Trusted checkout repository override"
        required: false
        type: string
        default: ""
      checkout_ref:
        description: "Trusted checkout ref metadata override"
        required: false
        type: string
        default: ""
      checkout_sha:
        description: "Trusted checkout exact SHA override"
        required: false
        type: string
        default: ""
      comparison_base_sha:
        description: "Trusted comparison base SHA override"
        required: false
        type: string
        default: ""
      pr_number:
        description: "Approved pull request number for trusted PR runs"
        required: false
        type: string
        default: ""
      trusted_reason:
        description: "Human-readable trusted execution rationale"
        required: false
        type: string
        default: ""
    secrets:
      PERSONAL_ACCESS_TOKEN:
        required: false
      HCLOUD_TOKEN:
        required: false
      HCLOUD_SSH_KEY_ID:
        required: false
      R2_ENDPOINT:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
    outputs:
      r2_iso_name:
        description: "ISO filename uploaded to R2 (e.g. nails-os-x86_64.iso)"
        value: ${{ jobs.build-and-verify.outputs.r2_iso_name }}
      r2_uploaded:
        description: "Whether the ISO was successfully uploaded to R2"
        value: ${{ jobs.build-and-verify.outputs.r2_uploaded }}
      checksums_content:
        description: "Base64-encoded content of dist/checksums.txt"
        value: ${{ jobs.build-and-verify.outputs.checksums_content }}
      build_metadata_content:
        description: "Base64-encoded content of dist/build-metadata.json"
        value: ${{ jobs.build-and-verify.outputs.build_metadata_content }}
      r2_sbom_name:
        description: "SBOM filename uploaded to R2"
        value: ${{ jobs.build-and-verify.outputs.r2_sbom_name }}
      r2_vuln_report_name:
        description: "Vulnerability report filename uploaded to R2"
        value: ${{ jobs.build-and-verify.outputs.r2_vuln_report_name }}
      r2_sbom_uploaded:
        description: "Whether the SBOM was uploaded to R2"
        value: ${{ jobs.build-and-verify.outputs.r2_sbom_uploaded }}
      r2_vuln_uploaded:
        description: "Whether the vulnerability report was uploaded to R2"
        value: ${{ jobs.build-and-verify.outputs.r2_vuln_uploaded }}
      vulnerability_summary:
        description: "Human-readable vulnerability summary"
        value: ${{ jobs.build-and-verify.outputs.vulnerability_summary }}

permissions:
  contents: read

concurrency:
  group: build-iso-${{ inputs.pr_number || inputs.checkout_sha || github.ref || github.run_id }}
  cancel-in-progress: true

env:
  NIX_SETUP_SCRIPT: | # pragma: allowlist secret
    set -euo pipefail
    INSTALLER_URL='https://install.determinate.systems/nix'
    INSTALLER_SHA256='1de1a9ddba23464d037aea82a16ca6cc800e1b06eda67c8007560ab6c56afdb7' # pragma: allowlist secret
    NIX_INSTALLER_BINARY_ROOT='https://install.determinate.systems/nix/tag/v3.17.3'
    TMP_DIR=$(mktemp -d)
    trap 'rm -rf "$TMP_DIR"' EXIT
    INSTALLER="$TMP_DIR/determinate-nix-installer.sh"
    curl --proto '=https' --tlsv1.2 -sSf -L "$INSTALLER_URL" -o "$INSTALLER"
    ACTUAL_SHA256=$(sha256sum "$INSTALLER" | awk '{print $1}')
    if [ "$ACTUAL_SHA256" != "$INSTALLER_SHA256" ]; then
      echo "Determinate installer checksum mismatch: expected $INSTALLER_SHA256 got $ACTUAL_SHA256" >&2
      exit 1
    fi
    chmod 0755 "$INSTALLER"
    NIX_INSTALLER_BINARY_ROOT="$NIX_INSTALLER_BINARY_ROOT" sh "$INSTALLER" install --no-confirm
    mkdir -p /etc/nix
    cat > /etc/nix/nix.conf << 'NIXCONF'
    experimental-features = nix-command flakes
    max-jobs = auto
    cores = 0
    sandbox = true
    accept-flake-config = false
    NIXCONF
    systemctl restart nix-daemon
    for bin in /nix/var/nix/profiles/default/bin/*; do
      ln -sf "$bin" /usr/local/bin/
    done

jobs:
  resolve-run-context:
    name: Resolve trusted run context
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_mode: ${{ steps.resolve.outputs.run_mode }}
      reason: ${{ steps.resolve.outputs.reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_sha: ${{ steps.resolve.outputs.checkout_sha }}
      comparison_base_sha: ${{ steps.resolve.outputs.comparison_base_sha }}
    steps:
      - name: Resolve trusted checkout target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CHECKOUT_REPOSITORY: ${{ inputs.checkout_repository }}
          INPUT_CHECKOUT_REF: ${{ inputs.checkout_ref }}
          INPUT_CHECKOUT_SHA: ${{ inputs.checkout_sha }}
          INPUT_COMPARISON_BASE_SHA: ${{ inputs.comparison_base_sha }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_TRUSTED_REASON: ${{ inputs.trusted_reason }}
        run: |
          python3 <<'PY'
          import os
          import re
          repo = os.environ["GITHUB_REPOSITORY"]
          event_name = os.environ["EVENT_NAME"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          run_mode = ""
          reason = ""
          pr_number = ""
          checkout_repository = repo
          checkout_ref = os.environ["GITHUB_REF"]
          checkout_sha = os.environ["GITHUB_SHA"]
          comparison_base_sha = ""

          def write_output(name, value):
              value = "" if value is None else str(value)
              with open(output_path, "a", encoding="utf-8") as fh:
                  if "\n" in value:
                      fh.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{name}={value}\n")

          def is_full_sha(value):
              return bool(re.fullmatch(r"[0-9a-f]{40}", value or ""))

          def is_repo_slug(value):
              return bool(re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", value or ""))

          if event_name == "workflow_dispatch":
              run_mode = "manual"
              reason = "Trusted manual run; provisioning the Hetzner-backed ISO builder is allowed."
          elif event_name == "workflow_call":
              input_checkout_repository = os.environ.get("INPUT_CHECKOUT_REPOSITORY", "")
              input_checkout_ref = os.environ.get("INPUT_CHECKOUT_REF", "")
              input_checkout_sha = os.environ.get("INPUT_CHECKOUT_SHA", "")
              input_comparison_base_sha = os.environ.get("INPUT_COMPARISON_BASE_SHA", "")
              input_pr_number = os.environ.get("INPUT_PR_NUMBER", "")
              input_trusted_reason = os.environ.get("INPUT_TRUSTED_REASON", "")

              if input_checkout_repository or input_checkout_ref or input_checkout_sha or input_pr_number:
                  if not is_repo_slug(input_checkout_repository):
                      raise SystemExit(f"Invalid checkout repository override: {input_checkout_repository!r}")
                  if not input_checkout_ref:
                      raise SystemExit("checkout_ref override is required when checkout overrides are provided")
                  if not is_full_sha(input_checkout_sha):
                      raise SystemExit(f"Invalid checkout SHA override: {input_checkout_sha!r}")
                  if input_comparison_base_sha and not is_full_sha(input_comparison_base_sha):
                      raise SystemExit(f"Invalid comparison base SHA override: {input_comparison_base_sha!r}")
                  if input_pr_number and not input_pr_number.isdigit():
                      raise SystemExit(f"Invalid pull request number override: {input_pr_number!r}")

                  run_mode = "pr" if input_pr_number else "reusable"
                  reason = input_trusted_reason or (
                      f"Trusted reusable workflow invocation against exact SHA {input_checkout_sha}; provisioning the Hetzner-backed ISO builder is allowed."
                  )
                  pr_number = input_pr_number
                  checkout_repository = input_checkout_repository
                  checkout_ref = input_checkout_ref
                  checkout_sha = input_checkout_sha
                  comparison_base_sha = input_comparison_base_sha
              else:
                  run_mode = "reusable"
                  reason = "Trusted reusable workflow invocation; provisioning the Hetzner-backed ISO builder is allowed."
          else:
              raise SystemExit(
                  f"Event `{event_name}` is not allowed to provision secret-backed Hetzner runners."
              )

          write_output("run_mode", run_mode)
          write_output("reason", reason)
          write_output("pr_number", pr_number)
          write_output("checkout_repository", checkout_repository)
          write_output("checkout_ref", checkout_ref)
          write_output("checkout_sha", checkout_sha)
          write_output("comparison_base_sha", comparison_base_sha)

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Trusted run context\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| Event | `{event_name}` |\n")
              summary.write(f"| Run mode | `{run_mode}` |\n")
              summary.write(f"| PR number | `{pr_number or 'n/a'}` |\n")
              summary.write(f"| Checkout repository | `{checkout_repository}` |\n")
              summary.write(f"| Checkout ref | `{checkout_ref}` |\n")
              summary.write(f"| Checkout SHA | `{checkout_sha}` |\n")
              summary.write(f"| Comparison base SHA | `{comparison_base_sha or 'n/a'}` |\n")
              summary.write(f"| Reason | {reason} |\n")
          PY

  # ===========================================================================
  # Job 0: Run Python unit tests (lightweight, no Nix/Hetzner infrastructure)
  # ===========================================================================
  python-tests:
    name: Python unit tests
    needs: resolve-run-context
    if: needs.resolve-run-context.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ needs.resolve-run-context.outputs.checkout_repository }}
          ref: ${{ needs.resolve-run-context.outputs.checkout_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Verify checked out revision
        run: |
          set -euo pipefail
          expected_sha='${{ needs.resolve-run-context.outputs.checkout_sha }}'
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$expected_sha" ]]; then
            echo "::error::Checked out SHA '$actual_sha' does not match expected '$expected_sha'."
            exit 1
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest tests/ -v

  # ===========================================================================
  # Job 1: Provision a Hetzner Cloud self-hosted runner
  # ===========================================================================
  # Tries 9 server_type × location combinations in sequence. Each combo gets
  # ~60s of API retries before we move to the next. This handles transient
  # capacity shortages gracefully.
  #
  # Fallback order (most powerful → most available):
  #   ccx33 (8 dedicated vCPU, 32GB) → ccx23 (4 dedicated, 16GB) → cpx41 (8 shared, 16GB)
  #   Locations: nbg1 (Nuremberg) → hel1 (Helsinki) → fsn1 (Falkenstein)
  # ===========================================================================
  create-runner:
    needs: [resolve-run-context, python-tests]
    if: needs.resolve-run-context.result == 'success' && needs.python-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HCLOUD_SSH_KEY_ID_EFFECTIVE: ${{ secrets.HCLOUD_SSH_KEY_ID || vars.HCLOUD_SSH_KEY_ID }}
    outputs:
      label: ${{ steps.validate-runner-selection.outputs.label }}
      server_id: ${{ steps.validate-runner-selection.outputs.server_id }}
      server_type: ${{ steps.validate-runner-selection.outputs.server_type }}
      location: ${{ steps.validate-runner-selection.outputs.location }}
    steps:
      - name: Validate provisioning configuration
        run: | # pragma: allowlist secret
          set -euo pipefail
          if [ -z "${HCLOUD_SSH_KEY_ID_EFFECTIVE:-}" ]; then
            echo "::error::HCLOUD_SSH_KEY_ID is required for Hetzner runner provisioning. Configure it as a repository secret (preferred) or repository variable."
            exit 1
          fi
          echo "HCLOUD_SSH_KEY_ID is configured for Hetzner runner provisioning."

      # -----------------------------------------------------------------------
      # Budget check: estimate current Hetzner project spend from running servers
      # -----------------------------------------------------------------------
      - name: Check Hetzner cost budget
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: | # pragma: allowlist secret
          set -euo pipefail
          # Mask tokens
          [[ -n "${HCLOUD_TOKEN:-}" ]] && echo "::add-mask::$HCLOUD_TOKEN"
          [[ -n "${GH_TOKEN:-}" ]] && echo "::add-mask::$GH_TOKEN"

          BUDGET_EUR="20.00"
          REPO="${{ github.repository }}"
          CURRENT_MONTH=$(date -u +%Y-%m)

          # --- Read cumulative cost from repo variable (JSON: {"month":"YYYY-MM","total":"X.XXXX"}) ---
          CUMULATIVE_COST="0"
          if _raw=$(gh api "repos/$REPO/actions/variables/HETZNER_CUMULATIVE_COST_EUR" \
               --jq '.value' 2>/dev/null); then
            _stored_month=$(echo "$_raw" | jq -r '.month // empty' 2>/dev/null) || true
            _stored_total=$(echo "$_raw" | jq -r '.total // empty' 2>/dev/null) || true
            if [ "$_stored_month" = "$CURRENT_MONTH" ] && [[ "${_stored_total:-}" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
              CUMULATIVE_COST="$_stored_total"
              echo "Cumulative cost this month ($CURRENT_MONTH): €$CUMULATIVE_COST"
            else
              echo "Stored month ('${_stored_month:-}') ≠ current month ('$CURRENT_MONTH') — resetting to €0"
            fi
          else
            echo "::notice::Could not read HETZNER_CUMULATIVE_COST_EUR variable. Assuming €0."
          fi

          # --- Estimate cost of currently running servers ---
          if ! SERVERS=$(curl -s --fail-with-body --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50"); then
            echo "::warning::Failed to query Hetzner servers API. Skipping running-server estimate."
            SERVERS='{"servers":[]}'
          fi

          if ! PRICING=$(curl -s --fail-with-body --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/pricing"); then
            echo "::warning::Failed to query Hetzner pricing API. Skipping running-server estimate."
            PRICING='{"pricing":{"server_types":[],"primary_ips":[]}}'
          fi

          TOTAL_COST=$(echo "$SERVERS" | jq -r --argjson pricing "$PRICING" '
            [.servers[] |
              (.created | sub("\\+00:00$"; "Z") | fromdateiso8601) as $created |
              ((now - $created) / 3600 | ceil | if . < 1 then 1 else . end) as $hours |
              .server_type.name as $type |
              .location.name as $loc |
              ($pricing.pricing.server_types[] | select(.name == $type) |
                .prices[] | select(.location == $loc) |
                .price_hourly.gross // "0" | tonumber) as $hourly |
              ($hours * $hourly)
            ] | add // 0
          ' 2>/dev/null || echo "0")

          IPV4_COST=$(echo "$SERVERS" | jq -r --argjson pricing "$PRICING" '
            [.servers[] |
              select(.public_net.ipv4.ip != null) |
              (.created | sub("\\+00:00$"; "Z") | fromdateiso8601) as $created |
              ((now - $created) / 3600 | ceil | if . < 1 then 1 else . end) as $hours |
              .location.name as $loc |
              ($pricing.pricing.primary_ips[] | select(.type == "ipv4") |
                .prices[] | select(.location == $loc) |
                .price_hourly.gross // "0" | tonumber) as $ipv4_hourly |
              ($hours * $ipv4_hourly)
            ] | add // 0
          ' 2>/dev/null || echo "0")

          RUNNING_COST=$(awk "BEGIN {printf \"%.10f\", $TOTAL_COST + $IPV4_COST}")
          RUNNING_COST_FMT=$(awk "BEGIN {printf \"%.4f\", $RUNNING_COST}")

          # --- Budget check: cumulative (tracked) + running servers ---
          COMBINED_COST=$(awk "BEGIN {printf \"%.10f\", $CUMULATIVE_COST + $RUNNING_COST}")
          COMBINED_COST_FMT=$(awk "BEGIN {printf \"%.4f\", $CUMULATIVE_COST + $RUNNING_COST}")

          echo "Month: $CURRENT_MONTH"
          echo "Cumulative (tracked): €$CUMULATIVE_COST"
          echo "Running servers (est): €$RUNNING_COST_FMT"
          echo "Combined estimate:     €$COMBINED_COST_FMT (budget: €$BUDGET_EUR)"

          if awk "BEGIN {exit !($COMBINED_COST > $BUDGET_EUR)}"; then
            echo "::error::Monthly Hetzner spend (~€$COMBINED_COST_FMT cumulative + running) exceeds €$BUDGET_EUR budget. Aborting to prevent overspend."
            exit 1
          fi

          echo "✓ Within budget (€$COMBINED_COST_FMT / €$BUDGET_EUR)"

      # -----------------------------------------------------------------------
      # Combo 1: ccx33 @ nbg1 (8 dedicated vCPU, 32GB RAM, 240GB SSD)
      # -----------------------------------------------------------------------
      - name: "Try combo 1: ccx33 @ nbg1"
        id: combo-1
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: ccx33
          location: nbg1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 2: ccx33 @ hel1 (Helsinki, FI)
      # -----------------------------------------------------------------------
      - name: "Try combo 2: ccx33 @ hel1"
        id: combo-2
        if: steps.combo-1.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: ccx33
          location: hel1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 3: ccx33 @ fsn1 (Falkenstein, DE)
      # -----------------------------------------------------------------------
      - name: "Try combo 3: ccx33 @ fsn1"
        id: combo-3
        if: steps.combo-1.outcome == 'failure' && steps.combo-2.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: ccx33
          location: fsn1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 4: ccx23 @ nbg1 (4 dedicated vCPU, 16GB RAM, 160GB SSD)
      # -----------------------------------------------------------------------
      - name: "Try combo 4: ccx23 @ nbg1"
        id: combo-4
        if: >-
          steps.combo-1.outcome == 'failure' &&
          steps.combo-2.outcome == 'failure' &&
          steps.combo-3.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: ccx23
          location: nbg1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 5: ccx23 @ hel1
      # -----------------------------------------------------------------------
      - name: "Try combo 5: ccx23 @ hel1"
        id: combo-5
        if: >-
          steps.combo-1.outcome == 'failure' &&
          steps.combo-2.outcome == 'failure' &&
          steps.combo-3.outcome == 'failure' &&
          steps.combo-4.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: ccx23
          location: hel1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 6: ccx23 @ fsn1
      # -----------------------------------------------------------------------
      - name: "Try combo 6: ccx23 @ fsn1"
        id: combo-6
        if: >-
          steps.combo-1.outcome == 'failure' &&
          steps.combo-2.outcome == 'failure' &&
          steps.combo-3.outcome == 'failure' &&
          steps.combo-4.outcome == 'failure' &&
          steps.combo-5.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: ccx23
          location: fsn1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 7: cpx41 @ nbg1 (8 shared vCPU, 16GB RAM, 240GB SSD)
      # -----------------------------------------------------------------------
      - name: "Try combo 7: cpx41 @ nbg1"
        id: combo-7
        if: >-
          steps.combo-1.outcome == 'failure' &&
          steps.combo-2.outcome == 'failure' &&
          steps.combo-3.outcome == 'failure' &&
          steps.combo-4.outcome == 'failure' &&
          steps.combo-5.outcome == 'failure' &&
          steps.combo-6.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: cpx41
          location: nbg1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 8: cpx41 @ hel1
      # -----------------------------------------------------------------------
      - name: "Try combo 8: cpx41 @ hel1"
        id: combo-8
        if: >-
          steps.combo-1.outcome == 'failure' &&
          steps.combo-2.outcome == 'failure' &&
          steps.combo-3.outcome == 'failure' &&
          steps.combo-4.outcome == 'failure' &&
          steps.combo-5.outcome == 'failure' &&
          steps.combo-6.outcome == 'failure' &&
          steps.combo-7.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: cpx41
          location: hel1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Combo 9: cpx41 @ fsn1 (last resort)
      # -----------------------------------------------------------------------
      - name: "Try combo 9: cpx41 @ fsn1"
        id: combo-9
        if: >-
          steps.combo-1.outcome == 'failure' &&
          steps.combo-2.outcome == 'failure' &&
          steps.combo-3.outcome == 'failure' &&
          steps.combo-4.outcome == 'failure' &&
          steps.combo-5.outcome == 'failure' &&
          steps.combo-6.outcome == 'failure' &&
          steps.combo-7.outcome == 'failure' &&
          steps.combo-8.outcome == 'failure'
        continue-on-error: true
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: create
          server_type: cpx41
          location: fsn1
          image: ubuntu-24.04
          create_wait: '60'
          server_wait: '30'
          runner_wait: '120'
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          ssh_key: ${{ env.HCLOUD_SSH_KEY_ID_EFFECTIVE }}
          pre_runner_script: ${{ env.NIX_SETUP_SCRIPT }}

      # -----------------------------------------------------------------------
      # Determine which combo succeeded and export its outputs
      # -----------------------------------------------------------------------
      - name: Determine successful combo
        id: determine-combo
        run: |
          set -euo pipefail
          echo "::group::Evaluating combo results"

          # Array of combo metadata: step_id|server_type|location
          combos=(
            "combo-1|ccx33|nbg1"
            "combo-2|ccx33|hel1"
            "combo-3|ccx33|fsn1"
            "combo-4|ccx23|nbg1"
            "combo-5|ccx23|hel1"
            "combo-6|ccx23|fsn1"
            "combo-7|cpx41|nbg1"
            "combo-8|cpx41|hel1"
            "combo-9|cpx41|fsn1"
          )

          # Step outcomes from GitHub context
          outcomes=(
            "${{ steps.combo-1.outcome }}"
            "${{ steps.combo-2.outcome }}"
            "${{ steps.combo-3.outcome }}"
            "${{ steps.combo-4.outcome }}"
            "${{ steps.combo-5.outcome }}"
            "${{ steps.combo-6.outcome }}"
            "${{ steps.combo-7.outcome }}"
            "${{ steps.combo-8.outcome }}"
            "${{ steps.combo-9.outcome }}"
          )

          # Step output values (label and server_id from the action)
          labels=(
            "${{ steps.combo-1.outputs.label }}"
            "${{ steps.combo-2.outputs.label }}"
            "${{ steps.combo-3.outputs.label }}"
            "${{ steps.combo-4.outputs.label }}"
            "${{ steps.combo-5.outputs.label }}"
            "${{ steps.combo-6.outputs.label }}"
            "${{ steps.combo-7.outputs.label }}"
            "${{ steps.combo-8.outputs.label }}"
            "${{ steps.combo-9.outputs.label }}"
          )

          server_ids=(
            "${{ steps.combo-1.outputs.server_id }}"
            "${{ steps.combo-2.outputs.server_id }}"
            "${{ steps.combo-3.outputs.server_id }}"
            "${{ steps.combo-4.outputs.server_id }}"
            "${{ steps.combo-5.outputs.server_id }}"
            "${{ steps.combo-6.outputs.server_id }}"
            "${{ steps.combo-7.outputs.server_id }}"
            "${{ steps.combo-8.outputs.server_id }}"
            "${{ steps.combo-9.outputs.server_id }}"
          )

          found=false
          for i in "${!combos[@]}"; do
            IFS='|' read -r step_id server_type location <<< "${combos[$i]}"
            outcome="${outcomes[$i]}"
            echo "  $step_id ($server_type @ $location): $outcome"

            if [[ "$outcome" == "success" && "$found" == "false" ]]; then
              found=true
              echo "✅ Using $step_id: $server_type @ $location"
              echo "label=${labels[$i]}" >> "$GITHUB_OUTPUT"
              echo "server_id=${server_ids[$i]}" >> "$GITHUB_OUTPUT"
              echo "server_type=$server_type" >> "$GITHUB_OUTPUT"
              echo "location=$location" >> "$GITHUB_OUTPUT"
            fi
          done

          echo "::endgroup::"

          if [[ "$found" == "false" ]]; then
            echo "::error::All 9 server combos failed. Unable to provision a runner."
            echo "Check Hetzner Cloud capacity and API token validity."
            exit 1
          fi

      - name: Validate selected runner outputs
        id: validate-runner-selection
        env:
          RAW_LABEL: ${{ steps.determine-combo.outputs.label }}
          RAW_SERVER_ID: ${{ steps.determine-combo.outputs.server_id }}
          SERVER_TYPE: ${{ steps.determine-combo.outputs.server_type }}
          LOCATION: ${{ steps.determine-combo.outputs.location }}
        run: |
          set -euo pipefail

          label="${RAW_LABEL:-}"
          server_id="${RAW_SERVER_ID:-}"

          if [[ -z "$label" ]]; then
            echo "::error::Provisioned runner label is empty."
            exit 1
          fi

          if ! [[ "$label" =~ ^[A-Za-z0-9_-]{1,64}$ ]]; then
            echo "::error::Provisioned runner label is invalid: '$label'"
            exit 1
          fi

          if [[ -z "$server_id" ]]; then
            echo "::error::Provisioned Hetzner server_id is empty."
            exit 1
          fi

          if ! [[ "$server_id" =~ ^[0-9]+$ ]]; then
            echo "::error::Provisioned Hetzner server_id is invalid: '$server_id'"
            exit 1
          fi

          {
            echo "label=$label"
            echo "server_id=$server_id"
            echo "server_type=${SERVER_TYPE}"
            echo "location=${LOCATION}"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Cleanup orphaned servers from failed combos
      # -----------------------------------------------------------------------
      # A combo can fail *after* the server was created (e.g., runner registration
      # timeout). We must delete those servers to avoid billing leaks.
      # -----------------------------------------------------------------------
      - name: Cleanup orphaned servers from failed combos
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${HCLOUD_TOKEN:-}" ]] && echo "::add-mask::$HCLOUD_TOKEN"
          echo "::group::Cleaning up orphaned servers"

          # The successful combo's server_id (keep this one alive)
          KEEP_SERVER_ID="${{ steps.validate-runner-selection.outputs.server_id }}"

          # All server IDs from all combos (empty string if combo was skipped)
          all_server_ids=(
            "${{ steps.combo-1.outputs.server_id }}"
            "${{ steps.combo-2.outputs.server_id }}"
            "${{ steps.combo-3.outputs.server_id }}"
            "${{ steps.combo-4.outputs.server_id }}"
            "${{ steps.combo-5.outputs.server_id }}"
            "${{ steps.combo-6.outputs.server_id }}"
            "${{ steps.combo-7.outputs.server_id }}"
            "${{ steps.combo-8.outputs.server_id }}"
            "${{ steps.combo-9.outputs.server_id }}"
          )

          invalid_server_ids=()
          failed_deletions=()

          for sid in "${all_server_ids[@]}"; do
            if [[ -z "$sid" || "$sid" == "$KEEP_SERVER_ID" ]]; then
              continue
            fi

            if ! [[ "$sid" =~ ^[0-9]+$ ]]; then
              echo "::error::Refusing to delete invalid Hetzner server_id '$sid' from runner action output."
              invalid_server_ids+=("$sid")
              continue
            fi

            echo "  Deleting orphaned server $sid..."
            deleted=false
            for attempt in 1 2 3; do
              http_code=$(curl -s -X DELETE \
                -H "Authorization: Bearer $HCLOUD_TOKEN" \
                "https://api.hetzner.cloud/v1/servers/$sid" \
                -o /dev/null -w "%{http_code}")
              if [[ "$http_code" =~ ^(200|204|404)$ ]]; then
                echo "  HTTP $http_code — server $sid deleted (attempt $attempt)"
                deleted=true
                break
              fi
              echo "  HTTP $http_code — attempt $attempt failed, retrying in 5s..."
              sleep 5
            done

            if [[ "$deleted" != "true" ]]; then
              failed_deletions+=("$sid")
            fi
          done

          echo "::endgroup::"

          if (( ${#invalid_server_ids[@]} > 0 )); then
            printf '::error::Refused to delete non-numeric Hetzner server ids from runner action outputs: %s\n' "${invalid_server_ids[*]}"
            exit 1
          fi

          if (( ${#failed_deletions[@]} > 0 )); then
            printf '::error::Failed to delete orphaned Hetzner servers: %s\n' "${failed_deletions[*]}"
            exit 1
          fi

  # ===========================================================================
  # Job 2: Build the ISO and verify reproducibility
  # ===========================================================================
  build-and-verify:
    needs: [resolve-run-context, create-runner]
    if: needs.resolve-run-context.result == 'success' && needs.create-runner.result == 'success'
    runs-on: ${{ needs.create-runner.outputs.label }}
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      EFFECTIVE_CHECKOUT_REPOSITORY: ${{ needs.resolve-run-context.outputs.checkout_repository }}
      EFFECTIVE_CHECKOUT_REF: ${{ needs.resolve-run-context.outputs.checkout_ref }}
      EFFECTIVE_CHECKOUT_SHA: ${{ needs.resolve-run-context.outputs.checkout_sha }}
      RUN_MODE: ${{ needs.resolve-run-context.outputs.run_mode }}
    outputs:
      r2_iso_name: ${{ steps.r2-upload.outputs.iso_name || '' }}
      r2_uploaded: ${{ steps.r2-upload.outputs.r2_uploaded || 'false' }}
      checksums_content: ${{ steps.capture-metadata.outputs.checksums_content_b64 }}
      build_metadata_content: ${{ steps.capture-metadata.outputs.build_metadata_content_b64 }}
      r2_sbom_name: ${{ steps.r2-upload.outputs.sbom_name || '' }}
      r2_vuln_report_name: ${{ steps.r2-upload.outputs.vuln_report_name || '' }}
      r2_sbom_uploaded: ${{ steps.r2-upload.outputs.sbom_uploaded || 'false' }}
      r2_vuln_uploaded: ${{ steps.r2-upload.outputs.vuln_uploaded || 'false' }}
      vulnerability_summary: ${{ steps.vuln-policy.outputs.summary || 'not-run' }}
    steps:
      # -----------------------------------------------------------------------
      # Install host dependencies
      # jq and unzip are not pre-installed on Ubuntu 24.04 minimal cloud
      # images. Install them first so every subsequent step can rely on them
      # unconditionally (jq is used in session-cost; unzip is used by the AWS
      # CLI installer).
      # -----------------------------------------------------------------------
      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gnupg jq unzip

      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.EFFECTIVE_CHECKOUT_REPOSITORY }}
          ref: ${{ env.EFFECTIVE_CHECKOUT_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked out revision
        run: |
          set -euo pipefail
          expected_sha='${{ env.EFFECTIVE_CHECKOUT_SHA }}'
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$expected_sha" ]]; then
            echo "::error::Checked out SHA '$actual_sha' does not match expected '$expected_sha'."
            exit 1
          fi
          echo "Checked out exact SHA $actual_sha from ${{ env.EFFECTIVE_CHECKOUT_REPOSITORY }} (${{ env.EFFECTIVE_CHECKOUT_REF }})."

      # -----------------------------------------------------------------------
      # Activate the Nix installation provisioned during Hetzner runner
      # creation. On ephemeral self-hosted runners the installation exists on
      # disk, but each job still needs an explicit PATH/environment activation.
      # -----------------------------------------------------------------------
      - name: Activate provisioned Nix
        run: |
          set -euo pipefail

          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"

          echo "::group::Activate provisioned Nix"

          if ! command -v nix >/dev/null 2>&1 || ! command -v nix-store >/dev/null 2>&1; then
            echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"
            export PATH="$NIX_BIN_DIR:$PATH"
          fi

          if ! command -v nix >/dev/null 2>&1; then
            echo "::error::nix is unavailable after PATH activation"
            echo "PATH=$PATH"
            echo "Expected Nix bin directory: $NIX_BIN_DIR"
            echo "Listing /nix/var/nix/profiles/default for diagnostics:"
            ls -la /nix/var/nix/profiles/default 2>/dev/null || true
            echo "Listing $NIX_BIN_DIR for diagnostics:"
            ls -la "$NIX_BIN_DIR" 2>/dev/null || true
            exit 1
          fi

          if ! command -v nix-store >/dev/null 2>&1; then
            echo "::error::nix-store is unavailable after PATH activation"
            echo "PATH=$PATH"
            echo "Expected Nix bin directory: $NIX_BIN_DIR"
            echo "Listing /nix/var/nix/profiles/default for diagnostics:"
            ls -la /nix/var/nix/profiles/default 2>/dev/null || true
            echo "Listing $NIX_BIN_DIR for diagnostics:"
            ls -la "$NIX_BIN_DIR" 2>/dev/null || true
            exit 1
          fi

          echo "Activated nix: $(command -v nix)"
          echo "Activated nix-store: $(command -v nix-store)"
          nix --version
          nix-store --version
          echo "::endgroup::"

      # -----------------------------------------------------------------------
      # Verify Nix installation
      # -----------------------------------------------------------------------
      - name: Verify Nix installation
        run: |
          echo "::group::Nix version"
          nix --version
          echo "::endgroup::"

          echo "::group::Nix configuration"
          nix show-config 2>/dev/null | grep -E '(experimental-features|max-jobs|cores|sandbox)' || true
          echo "::endgroup::"

          echo "::group::Disk space"
          df -h / /nix 2>/dev/null || df -h /
          echo "::endgroup::"

          echo "::group::System info"
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h | awk '/^Mem:/{print $2}')"
          echo "Server type: ${{ needs.create-runner.outputs.server_type }}"
          echo "Location: ${{ needs.create-runner.outputs.location }}"
          echo "::endgroup::"

      # -----------------------------------------------------------------------
      # Run the repository's existing pre-commit gates in CI using the same Nix
      # toolchain contributors use locally.
      # -----------------------------------------------------------------------
      - name: Run pre-commit gates
        env:
          COMPARISON_BASE_SHA: ${{ needs.resolve-run-context.outputs.comparison_base_sha }}
          HEAD_SHA: ${{ needs.resolve-run-context.outputs.checkout_sha }}
        run: |
          set -euo pipefail
          FROM_SHA="${COMPARISON_BASE_SHA:-}"

          if [ -z "$FROM_SHA" ]; then
            echo "No comparison base available; running pre-commit on all files."
            nix develop ./nix-config -c pre-commit run --all-files --show-diff-on-failure
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "$FROM_SHA" "$HEAD_SHA")
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No added/copied/modified/renamed files in diff; skipping pre-commit run."
            exit 0
          fi

          nix develop ./nix-config -c pre-commit run --files "${changed_files[@]}" --show-diff-on-failure

      # -----------------------------------------------------------------------
      # Run a selected subset of existing flake checks that cover current
      # security/privacy regressions without adding a new verification layer.
      # -----------------------------------------------------------------------
      - name: Detect KVM availability for NixOS VM flake checks
        id: detect-kvm-flake-checks
        run: |
          set -euo pipefail

          echo "::group::Detect Nix system features for VM flake checks"

          SYSTEM_FEATURES_JSON="$({ nix config show --json; } | jq -c '
            .["system-features"].value // []
            | if type == "array" then .
              elif type == "string" then split(" ") | map(select(length > 0))
              else []
              end
          ')"
          SYSTEM_FEATURES_HUMAN="$(jq -r '
            if length > 0 then join(", ") else "<none>" end
          ' <<< "$SYSTEM_FEATURES_JSON")"

          echo "Detected Nix system features: $SYSTEM_FEATURES_HUMAN"

          if jq -e 'index("kvm") != null' <<< "$SYSTEM_FEATURES_JSON" >/dev/null; then
            KVM_AVAILABLE=true
          else
            KVM_AVAILABLE=false
          fi

          echo "available=$KVM_AVAILABLE" >> "$GITHUB_OUTPUT"

          if [[ "$KVM_AVAILABLE" == "true" ]]; then
            echo "KVM-backed NixOS VM flake checks are enabled on this runner."
            {
              echo "## KVM-backed VM flake checks"
              echo ""
              echo "- Nix system features: \\`$SYSTEM_FEATURES_HUMAN\\`"
              echo "- Result: available"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::Skipping KVM-dependent NixOS VM flake checks because Nix system-features do not include 'kvm'. Detected: $SYSTEM_FEATURES_HUMAN"
            {
              echo "## KVM-backed VM flake checks"
              echo ""
              echo "- Nix system features: \\`$SYSTEM_FEATURES_HUMAN\\`"
              echo "- Result: unavailable"
              echo "- Action: skipping KVM-dependent NixOS VM flake checks on this runner"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "::endgroup::"

      - name: Run selected KVM-dependent NixOS VM flake checks
        if: steps.detect-kvm-flake-checks.outputs.available == 'true'
        run: |
          set -euo pipefail
          nix build -L \
            ./nix-config#checks.x86_64-linux.boot \
            ./nix-config#checks.x86_64-linux.tor-enforcement \
            ./nix-config#checks.x86_64-linux.dns-leak-prevention \
            ./nix-config#checks.x86_64-linux.shell-history \
            ./nix-config#checks.x86_64-linux.luks \
            ./nix-config#checks.x86_64-linux.unsafe-browser

      # -----------------------------------------------------------------------
      # Build the ISO (canonical build)
      # -----------------------------------------------------------------------
      - name: Build NAILS OS ISO (canonical)
        id: build-iso
        run: |
          echo "::group::Building ISO"
          build_start=$(date +%s)

          nix build ./nix-config#nails-os-iso -L

          build_end=$(date +%s)
          build_duration=$((build_end - build_start))
          echo "Build completed in ${build_duration}s ($(( build_duration / 60 ))m $(( build_duration % 60 ))s)"
          echo "::endgroup::"

          # Locate the ISO dynamically (filename includes NixOS version, nixpkgs rev, arch)
          ISO_PATH=$(find result/iso -name '*.iso' -type f | head -1)
          if [[ -z "$ISO_PATH" || ! -f "$ISO_PATH" ]]; then
            echo "::error::No ISO found in result/iso/"
            ls -la result/ result/iso/ 2>/dev/null || true
            exit 1
          fi
          ISO_FILENAME=$(basename "$ISO_PATH")

          ISO_SIZE=$(stat -c%s "$ISO_PATH")
          ISO_SHA256=$(sha256sum "$ISO_PATH" | awk '{print $1}')

          echo "ISO path: $ISO_PATH"
          echo "ISO filename: $ISO_FILENAME"
          echo "ISO size: $(( ISO_SIZE / 1048576 )) MB ($ISO_SIZE bytes)"
          echo "ISO SHA256: $ISO_SHA256"

          echo "iso_path=$ISO_PATH" >> "$GITHUB_OUTPUT"
          echo "iso_filename=$ISO_FILENAME" >> "$GITHUB_OUTPUT"
          echo "iso_sha256=$ISO_SHA256" >> "$GITHUB_OUTPUT"
          echo "iso_size=$ISO_SIZE" >> "$GITHUB_OUTPUT"
          echo "build_duration=$build_duration" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # L1: Same-store reproducibility check
      # -----------------------------------------------------------------------
      # Fast check: asks Nix to re-derive the output and verify it matches
      # what's already in the store. Catches non-deterministic build steps.
      # -----------------------------------------------------------------------
      - name: "Verify same-store reproducibility (L1)"
        id: l1-check
        run: |
          echo "::group::L1 same-store reproducibility check"

          if ! command -v nix-store &>/dev/null; then
            echo "::warning::nix-store not found in PATH — skipping L1 check"
            echo "l1_result=skipped" >> "$GITHUB_OUTPUT"
            echo "::endgroup::"
            exit 0
          fi

          DRV=$(nix path-info --derivation ./nix-config#nails-os-iso)
          echo "Derivation: $DRV"

          nix-store --realise "$DRV" --check -K 2>&1 | tee /tmp/nix-store-check.log

          exit_code=${PIPESTATUS[0]}
          if [[ $exit_code -eq 0 ]]; then
            echo "✅ L1 check passed: store outputs are reproducible"
            echo "l1_result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ L1 check found differences (exit code: $exit_code)"
            echo "l1_result=fail" >> "$GITHUB_OUTPUT"
          fi

          echo "::endgroup::"

      # -----------------------------------------------------------------------
      # L2: Full rebuild reproducibility verification
      # -----------------------------------------------------------------------
      # Expensive check: clears the Nix store and rebuilds from scratch, then
      # compares the resulting ISO byte-for-byte with the canonical build.
      # Only runs on main pushes or when explicitly requested.
      # -----------------------------------------------------------------------
      - name: "Verify rebuild reproducibility (L2)"
        id: l2-check
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.verify_reproducibility == true) ||
          (github.event_name == 'workflow_call' && inputs.verify_reproducibility == true)
        run: |
          echo "::group::L2 full rebuild reproducibility verification"
          # Gate: ensure there is enough disk space for a full rebuild
          AVAILABLE_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
          echo "Available disk space: ${AVAILABLE_GB} GB"
          if [[ "$AVAILABLE_GB" -lt 30 ]]; then
            echo "::error::Insufficient disk space for L2 rebuild: ${AVAILABLE_GB} GB available, need at least 30 GB"
            exit 1
          fi

          CANONICAL_HASH="${{ steps.build-iso.outputs.iso_sha256 }}"

          # Preserve the canonical ISO
          echo "Copying canonical ISO to /tmp..."
          cp "${{ steps.build-iso.outputs.iso_path }}" /tmp/canonical.iso

          # Clear the Nix store to force a full rebuild
          echo "Removing result symlink..."
          rm -f result
          rm -rf /nix/var/nix/gcroots/auto/* 2>/dev/null || true

          echo "Running garbage collection..."
          nix-collect-garbage -d 2>&1 | tail -5

          echo "Disk space after GC:"
          df -h / /nix 2>/dev/null || df -h /

          # Rebuild from scratch
          echo "Rebuilding ISO from clean store..."
          rebuild_start=$(date +%s)

          nix build ./nix-config#nails-os-iso -L

          rebuild_end=$(date +%s)
          rebuild_duration=$((rebuild_end - rebuild_start))
          echo "Rebuild completed in ${rebuild_duration}s ($(( rebuild_duration / 60 ))m $(( rebuild_duration % 60 ))s)"

          # Compare hashes - find rebuilt ISO dynamically
          REBUILD_ISO_PATH=$(find result/iso -name '*.iso' -type f | head -1)
          if [[ -z "$REBUILD_ISO_PATH" || ! -f "$REBUILD_ISO_PATH" ]]; then
            echo "::error::No ISO found in result/iso/ after rebuild"
            ls -la result/ result/iso/ 2>/dev/null || true
            echo "reproducible=error" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          REBUILD_HASH=$(sha256sum "$REBUILD_ISO_PATH" | awk '{print $1}')

          echo ""
          echo "Canonical SHA256: $CANONICAL_HASH"
          echo "Rebuild  SHA256: $REBUILD_HASH"
          echo ""

          if [[ "$CANONICAL_HASH" == "$REBUILD_HASH" ]]; then
            echo "✅ L2 check passed: ISO is reproducible across clean rebuilds"
            echo "reproducible=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::L2 check FAILED: ISO differs between builds"
            echo "reproducible=false" >> "$GITHUB_OUTPUT"

            # Generate diffoscope report for debugging
            echo "Running diffoscope to analyze differences..."
            nix shell nixpkgs#diffoscope -c diffoscope \
              /tmp/canonical.iso \
              "$REBUILD_ISO_PATH" \
              --html /tmp/diffoscope-report.html \
              --max-report-size 52428800 || true

            if [[ -f /tmp/diffoscope-report.html ]]; then
              echo "Diffoscope report generated at /tmp/diffoscope-report.html"
              echo "diffoscope_report=/tmp/diffoscope-report.html" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "::endgroup::"

      # -----------------------------------------------------------------------
      # Fail the build if reproducibility checks failed
      # -----------------------------------------------------------------------
      - name: Enforce reproducibility gate
        run: |
          L1="${{ steps.l1-check.outputs.l1_result }}"
          L2="${{ steps.l2-check.outputs.reproducible }}"
          failed=false

          if [[ "$L1" == "fail" ]]; then
            echo "::error::L1 same-store reproducibility check failed. Refusing to release a non-reproducible build."
            failed=true
          fi

          if [[ "$L2" == "false" ]]; then
            echo "::error::L2 full-rebuild reproducibility check failed. Refusing to release a non-reproducible build."
            failed=true
          fi

          if [[ "$failed" == "true" ]]; then
            exit 1
          fi

          echo "✅ Reproducibility gate passed"

      # -----------------------------------------------------------------------
      # Collect artifacts into dist/
      # -----------------------------------------------------------------------
      - name: Collect artifacts
        run: |
          mkdir -p dist
          ISO_PATH="${{ steps.build-iso.outputs.iso_path }}"
          if [[ -z "$ISO_PATH" || ! -f "$ISO_PATH" ]]; then
            ISO_PATH="$(find result/iso -name '*.iso' -type f | head -1)"
          fi
          cp "$ISO_PATH" dist/
          (cd dist && sha256sum *.iso > checksums.txt)
          echo "Contents of dist/:"
          ls -lh dist/

      # -----------------------------------------------------------------------
      # Generate build metadata
      # -----------------------------------------------------------------------
      - name: Generate build metadata
        run: |
          CHECKOUT_REF="${EFFECTIVE_CHECKOUT_REF}"
          CHECKOUT_REF_NAME="$CHECKOUT_REF"
          if [[ "$CHECKOUT_REF_NAME" == refs/heads/* ]]; then
            CHECKOUT_REF_NAME="${CHECKOUT_REF_NAME#refs/heads/}"
          elif [[ "$CHECKOUT_REF_NAME" == refs/tags/* ]]; then
            CHECKOUT_REF_NAME="${CHECKOUT_REF_NAME#refs/tags/}"
          fi

          # Extract nixpkgs revision from flake.lock
          NIXPKGS_REV="unknown"
          if [[ -f nix-config/flake.lock ]]; then
            NIXPKGS_REV=$(
              python3 -c "
          import json, sys
          with open('nix-config/flake.lock') as f:
              lock = json.load(f)
          nodes = lock.get('nodes', {})
          nixpkgs = nodes.get('nixpkgs', {})
          locked = nixpkgs.get('locked', {})
          print(locked.get('rev', 'unknown'))
          " 2>/dev/null || echo "unknown"
            )
          fi

          # Determine reproducibility status
          L1_RESULT="${{ steps.l1-check.outputs.l1_result }}"
          L2_RESULT="${{ steps.l2-check.outputs.reproducible }}"

          if [[ -z "$L2_RESULT" ]]; then
            L2_RESULT="skipped"
          fi

          # Ensure numeric fields have fallback values
          BUILD_DURATION="${{ steps.build-iso.outputs.build_duration }}"
          BUILD_DURATION="${BUILD_DURATION:-0}"
          ISO_SIZE="${{ steps.build-iso.outputs.iso_size }}"
          ISO_SIZE="${ISO_SIZE:-0}"

          BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          NIX_VERSION="$(nix --version 2>/dev/null | head -1)"
          GIT_VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo 'untagged')"

          mkdir -p dist

          # Use jq -n to safely construct JSON — all string values are properly escaped
          jq -n \
            --arg project "NAILS OS" \
            --arg version "$GIT_VERSION" \
            --arg commit "${EFFECTIVE_CHECKOUT_SHA}" \
            --arg ref "$CHECKOUT_REF" \
            --arg ref_name "$CHECKOUT_REF_NAME" \
            --arg repository "${EFFECTIVE_CHECKOUT_REPOSITORY}" \
            --arg timestamp "$BUILD_TIMESTAMP" \
            --argjson duration "${BUILD_DURATION}" \
            --arg server_type "${{ needs.create-runner.outputs.server_type }}" \
            --arg location "${{ needs.create-runner.outputs.location }}" \
            --arg nix_version "$NIX_VERSION" \
            --arg runner_label "${{ needs.create-runner.outputs.label }}" \
            --arg iso_filename "${{ steps.build-iso.outputs.iso_filename }}" \
            --arg iso_sha256 "${{ steps.build-iso.outputs.iso_sha256 }}" \
            --argjson iso_size "${ISO_SIZE}" \
            --arg l1_result "${L1_RESULT:-unknown}" \
            --arg l2_result "${L2_RESULT}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_number "${{ github.run_number }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --arg event_name "${{ github.event_name }}" \
            --arg triggered_by "${{ github.actor }}" \
            --arg nixpkgs_rev "${NIXPKGS_REV}" \
            '{
              project: $project,
              version: $version,
              git: {
                commit: $commit,
                ref: $ref,
                ref_name: $ref_name,
                repository: $repository
              },
              build: {
                timestamp: $timestamp,
                duration_seconds: $duration,
                server_type: $server_type,
                location: $location,
                nix_version: $nix_version,
                runner_label: $runner_label
              },
              iso: {
                filename: $iso_filename,
                sha256: $iso_sha256,
                size_bytes: $iso_size
              },
              reproducibility: {
                l1_same_store: $l1_result,
                l2_full_rebuild: $l2_result
              },
              workflow: {
                run_id: $run_id,
                run_number: $run_number,
                run_attempt: $run_attempt,
                event_name: $event_name,
                triggered_by: $triggered_by
              },
              nixpkgs: {
                revision: $nixpkgs_rev
              }
            }' > dist/build-metadata.json

          echo "Build metadata:"
          cat dist/build-metadata.json

      # -----------------------------------------------------------------------
      # Generate SBOM from the project-defined Nix output (no ad-hoc scripts).
      # This runs after build metadata exists so both artifacts can be correlated.
      # -----------------------------------------------------------------------
      - name: Generate CycloneDX SBOM
        id: sbom
        run: |
          set -euo pipefail
          mkdir -p dist

          nix build ./nix-config#sbom -L

          SBOM_FILE="dist/nails-os-sbom.cdx.json"
          if [ ! -f result/sbom.cdx.json ]; then
            echo "::error::Expected SBOM at result/sbom.cdx.json but it was not found"
            ls -la result || true
            exit 1
          fi
          cp result/sbom.cdx.json "$SBOM_FILE"

          echo "sbom_file=$SBOM_FILE" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Validate CycloneDX SBOM structure. Prefer lightweight JSON/schema sanity
      # checks in CI to avoid heavy toolchain overhead on every build.
      # -----------------------------------------------------------------------
      - name: Validate SBOM structure
        id: sbom-validate
        run: |
          set -euo pipefail
          SBOM_FILE="${{ steps.sbom.outputs.sbom_file }}"

          jq -e '
            .bomFormat == "CycloneDX" and
            (.specVersion | type == "string") and
            (.metadata | type == "object") and
            (.components | type == "array") and
            (.version | type == "number")
          ' "$SBOM_FILE" >/dev/null

          COMPONENT_COUNT=$(jq '.components | length' "$SBOM_FILE")
          if [ "$COMPONENT_COUNT" -le 0 ]; then
            echo "::error::SBOM has zero components"
            exit 1
          fi

          echo "component_count=$COMPONENT_COUNT" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Run vulnerability scan using the project-defined Nix app.
      # Policy: fail only on critical findings when CVSS scoring coverage is
      # sufficiently reliable; otherwise warn and keep report as artifact.
      # -----------------------------------------------------------------------
      - name: Run vulnerability scan (vulnix)
        id: vulnix-scan
        run: |
          set -euo pipefail
          mkdir -p dist

          TARGET=$(nix path-info ./nix-config#nixosConfigurations.nails-os-iso.config.system.build.toplevel)
          OUTPUT="dist/vulnix-results.json"

          nix run ./nix-config#vulnix-scan -- "$TARGET" "$OUTPUT" | tee /tmp/vulnix-summary.log

          echo "report_file=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Enforce vulnerability policy
        id: vuln-policy
        run: |
          set -euo pipefail
          REPORT="${{ steps.vulnix-scan.outputs.report_file }}"

          TOTAL=$(jq 'length' "$REPORT")
          CRITICAL=$(jq '[.[] | select((.cvssv3_basescore // 0) >= 9.0)] | length' "$REPORT")
          HIGH=$(jq '[.[] | select((.cvssv3_basescore // 0) >= 7.0 and (.cvssv3_basescore // 0) < 9.0)] | length' "$REPORT")
          SCORED=$(jq '[.[] | select((.cvssv3_basescore? | type) == "number")] | length' "$REPORT")

          RELIABLE=false
          if [ "$TOTAL" -eq 0 ]; then
            RELIABLE=true
          elif [ "$SCORED" -gt 0 ] && awk "BEGIN {exit !(($SCORED/$TOTAL) >= 0.8)}"; then
            RELIABLE=true
          fi

          SUMMARY="total=${TOTAL}, critical=${CRITICAL}, high=${HIGH}, scored=${SCORED}, reliable=${RELIABLE}"
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
          echo "critical_count=${CRITICAL}" >> "$GITHUB_OUTPUT"

          if [ "$CRITICAL" -gt 0 ] && [ "$RELIABLE" = "true" ]; then
            echo "::error::Critical vulnerabilities found with reliable CVSS signal (${SUMMARY})"
            exit 1
          fi

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::warning::Critical vulnerabilities detected, but CVSS signal is not reliable enough to hard-fail (${SUMMARY})."
          elif [ "$HIGH" -gt 0 ]; then
            echo "::warning::High-severity vulnerabilities detected (${SUMMARY})."
          else
            echo "No high/critical vulnerabilities detected (${SUMMARY})."
          fi

      - name: Upload SBOM and vulnerability artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: nails-os-security-${{ needs.resolve-run-context.outputs.checkout_sha }}
          path: |
            dist/nails-os-sbom.cdx.json
            dist/vulnix-results.json
          retention-days: 90
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Capture checksums.txt and build-metadata.json contents as step outputs
      # so they can be passed through workflow_call outputs to release.yml,
      # eliminating the need for release.yml to download a GitHub artifact.
      # -----------------------------------------------------------------------
      - name: Capture metadata outputs
        id: capture-metadata
        run: |
          # Use base64 to safely encode multiline content, avoiding EOF delimiter
          # collision and extra-newline corruption in GITHUB_OUTPUT multiline values.
          CHECKSUMS_B64=$(base64 -w 0 < dist/checksums.txt)
          BUILD_METADATA_B64=$(base64 -w 0 < dist/build-metadata.json)
          echo "checksums_content_b64=${CHECKSUMS_B64}" >> "$GITHUB_OUTPUT"
          echo "build_metadata_content_b64=${BUILD_METADATA_B64}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Upload ISO directly to Cloudflare R2 from the build runner.
      # Doing this here — on the Hetzner server that built the ISO — avoids
      # routing 4+ GB through GitHub's artifact storage (which consumes the
      # Pro plan's 1 GB shared quota and requires a second upload later).
      # Downstream jobs (release.yml) fetch from R2 instead.
      # -----------------------------------------------------------------------
      - name: Install AWS CLI
        run: |
          set -euo pipefail
          WORKDIR=$(mktemp -d)
          trap 'rm -rf "$WORKDIR"' EXIT
          export GNUPGHOME="$WORKDIR/gnupg"
          mkdir -m 700 "$GNUPGHOME"

          cat > "$WORKDIR/aws-cli-public-key.asc" <<'EOF'
          -----BEGIN PGP PUBLIC KEY BLOCK-----

          mQINBF2Cr7UBEADJZHcgusOJl7ENSyumXh85z0TRV0xJorM2B/JL0kHOyigQluUG
          ZMLhENaG0bYatdrKP+3H91lvK050pXwnO/R7fB/FSTouki4ciIx5OuLlnJZIxSzx
          PqGl0mkxImLNbGWoi6Lto0LYxqHN2iQtzlwTVmq9733zd3XfcXrZ3+LblHAgEt5G
          TfNxEKJ8soPLyWmwDH6HWCnjZ/aIQRBTIQ05uVeEoYxSh6wOai7ss/KveoSNBbYz
          gbdzoqI2Y8cgH2nbfgp3DSasaLZEdCSsIsK1u05CinE7k2qZ7KgKAUIcT/cR/grk
          C6VwsnDU0OUCideXcQ8WeHutqvgZH1JgKDbznoIzeQHJD238GEu+eKhRHcz8/jeG
          94zkcgJOz3KbZGYMiTh277Fvj9zzvZsbMBCedV1BTg3TqgvdX4bdkhf5cH+7NtWO
          lrFj6UwAsGukBTAOxC0l/dnSmZhJ7Z1KmEWilro/gOrjtOxqRQutlIqG22TaqoPG
          fYVN+en3Zwbt97kcgZDwqbuykNt64oZWc4XKCa3mprEGC3IbJTBFqglXmZ7l9ywG
          EEUJYOlb2XrSuPWml39beWdKM8kzr1OjnlOm6+lpTRCBfo0wa9F8YZRhHPAkwKkX
          XDeOGpWRj4ohOx0d2GWkyV5xyN14p2tQOCdOODmz80yUTgRpPVQUtOEhXQARAQAB
          tCFBV1MgQ0xJIFRlYW0gPGF3cy1jbGlAYW1hem9uLmNvbT6JAlQEEwEIAD4CGwMF
          CwkIBwIGFQoJCAsCBBYCAwECHgECF4AWIQT7Xbd/1cEYuAURraimMQrMRnJHXAUC
          aGveYQUJDMpiLAAKCRCmMQrMRnJHXKBYD/9Ab0qQdGiO5hObchG8xh8Rpb4Mjyf6
          0JrVo6m8GNjNj6BHkSc8fuTQJ/FaEhaQxj3pjZ3GXPrXjIIVChmICLlFuRXYzrXc
          Pw0lniybypsZEVai5kO0tCNBCCFuMN9RsmmRG8mf7lC4FSTbUDmxG/QlYK+0IV/l
          uJkzxWa+rySkdpm0JdqumjegNRgObdXHAQDWlubWQHWyZyIQ2B4U7AxqSpcdJp6I
          S4Zds4wVLd1WE5pquYQ8vS2cNlDm4QNg8wTj58e3lKN47hXHMIb6CHxRnb947oJa
          pg189LLPR5koh+EorNkA1wu5mAJtJvy5YMsppy2y/kIjp3lyY6AmPT1posgGk70Z
          CmToEZ5rbd7ARExtlh76A0cabMDFlEHDIK8RNUOSRr7L64+KxOUegKBfQHb9dADY
          qqiKqpCbKgvtWlds909Ms74JBgr2KwZCSY1HaOxnIr4CY43QRqAq5YHOay/mU+6w
          hhmdF18vpyK0vfkvvGresWtSXbag7Hkt3XjaEw76BzxQH21EBDqU8WJVjHgU6ru+
          DJTs+SxgJbaT3hb/vyjlw0lK+hFfhWKRwgOXH8vqducF95NRSUxtS4fpqxWVaw3Q
          V2OWSjbne99A5EPEySzryFTKbMGwaTlAwMCwYevt4YT6eb7NmFhTx0Fis4TalUs+
          j+c7Kg92pDx2uQ==
          =OBAt
          -----END PGP PUBLIC KEY BLOCK-----
          EOF

          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$WORKDIR/awscliv2.zip"
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip.sig" -o "$WORKDIR/awscliv2.zip.sig"
          gpg --batch --import "$WORKDIR/aws-cli-public-key.asc"

          ACTUAL_FINGERPRINT=$(gpg --batch --with-colons --fingerprint "AWS CLI Team <aws-cli@amazon.com>" | awk -F: '$1 == "fpr" { print $10; exit }')
          EXPECTED_FINGERPRINT='FB5DB77FD5C118B80511ADA8A6310ACC4672475C' # pragma: allowlist secret
          if [ "$ACTUAL_FINGERPRINT" != "$EXPECTED_FINGERPRINT" ]; then
            echo "::error::AWS CLI signing key fingerprint mismatch: expected $EXPECTED_FINGERPRINT got $ACTUAL_FINGERPRINT"
            exit 1
          fi

          gpg --batch --verify "$WORKDIR/awscliv2.zip.sig" "$WORKDIR/awscliv2.zip"
          unzip -q "$WORKDIR/awscliv2.zip" -d "$WORKDIR"
          sudo "$WORKDIR/aws/install" --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          aws --version

      - name: Upload ISO to Cloudflare R2
        id: r2-upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ vars.R2_BUCKET_NAME }}
          R2_PREFIX: ${{ inputs.r2_prefix || 'latest' }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_BUCKET:-}" ]; then
            if [ "${R2_PREFIX}" = "stable" ]; then
              echo "::error::Stable publication requires R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, and R2_BUCKET_NAME."
              exit 1
            fi
            echo "::warning::R2 not fully configured (need R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET_NAME) — skipping R2 upload"
            echo "r2_uploaded=false" >> "$GITHUB_OUTPUT"
            echo "iso_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISO_FILE=$(find dist -name '*.iso' -type f | head -1)
          ISO_NAME=$(basename "$ISO_FILE")

          # Validate R2_PREFIX — must be 'stable' or 'latest'
          [[ "$R2_PREFIX" =~ ^(stable|latest)$ ]] || { echo "::error::Invalid R2_PREFIX: $R2_PREFIX"; exit 1; }

          echo "::group::Uploading ${ISO_NAME} to R2 ${R2_PREFIX}/"
          aws s3 cp "$ISO_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/${ISO_NAME}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress

          SBOM_FILE="dist/nails-os-sbom.cdx.json"
          SBOM_NAME=""
          SBOM_UPLOADED="false"
          if [ -f "$SBOM_FILE" ]; then
            SBOM_NAME=$(basename "$SBOM_FILE")
            aws s3 cp "$SBOM_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/security/${SBOM_NAME}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-progress
            SBOM_UPLOADED="true"
          else
            echo "::warning::SBOM file not found, skipping R2 SBOM upload"
          fi

          VULN_FILE="dist/vulnix-results.json"
          VULN_NAME=""
          VULN_UPLOADED="false"
          if [ -f "$VULN_FILE" ]; then
            VULN_NAME=$(basename "$VULN_FILE")
            aws s3 cp "$VULN_FILE" "s3://${R2_BUCKET}/${R2_PREFIX}/security/${VULN_NAME}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-progress
            VULN_UPLOADED="true"
          else
            echo "::warning::Vulnerability report not found, skipping R2 vulnerability upload"
          fi
          echo "::endgroup::"

          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "r2_prefix=${R2_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "r2_uploaded=true" >> "$GITHUB_OUTPUT"
          echo "sbom_name=${SBOM_NAME}" >> "$GITHUB_OUTPUT"
          echo "sbom_uploaded=${SBOM_UPLOADED}" >> "$GITHUB_OUTPUT"
          echo "vuln_report_name=${VULN_NAME}" >> "$GITHUB_OUTPUT"
          echo "vuln_uploaded=${VULN_UPLOADED}" >> "$GITHUB_OUTPUT"
          echo "Uploaded ${ISO_NAME} to R2 ${R2_PREFIX}/"

      - name: Enforce stable R2 publication outputs
        env:
          R2_PREFIX: ${{ inputs.r2_prefix || 'latest' }}
          R2_UPLOADED: ${{ steps.r2-upload.outputs.r2_uploaded }}
          R2_ISO_NAME: ${{ steps.r2-upload.outputs.iso_name }}
        run: |
          set -euo pipefail
          if [ "$R2_PREFIX" != 'stable' ]; then
            echo "Non-stable publication path: R2 output gate not required."
            exit 0
          fi

          if [ "${R2_UPLOADED:-false}" != 'true' ]; then
            echo "::error::Stable publication requires a successful R2 ISO upload."
            exit 1
          fi

          if [ -z "${R2_ISO_NAME:-}" ]; then
            echo "::error::Stable publication requires a non-empty R2 ISO output name."
            exit 1
          fi

          echo "Stable R2 publication outputs validated for ${R2_ISO_NAME}."

      # -----------------------------------------------------------------------
      # Upload diffoscope report (only if L2 found differences)
      # -----------------------------------------------------------------------
      - name: Upload diffoscope report
        if: steps.l2-check.outputs.reproducible == 'false' && steps.l2-check.outputs.diffoscope_report != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: diffoscope-report-${{ needs.resolve-run-context.outputs.checkout_sha }}
          path: /tmp/diffoscope-report.html
          retention-days: 30

      # -----------------------------------------------------------------------
      # Upload build metadata artifacts (checksums.txt + build-metadata.json).
      # The ISO itself is already on R2 — no need to route 4+ GB through
      # GitHub artifact storage. These small files are all downstream jobs need
      # for release notes, checksums, and attestation subjects.
      # -----------------------------------------------------------------------
      - name: Upload build metadata artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: nails-os-iso-${{ needs.resolve-run-context.outputs.checkout_sha }}
          path: |
            dist/checksums.txt
            dist/build-metadata.json
          retention-days: 1
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Calculate session cost for summary
      # -----------------------------------------------------------------------
      - name: Calculate session cost
        if: always()
        id: session-cost
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${HCLOUD_TOKEN:-}" ]] && echo "::add-mask::$HCLOUD_TOKEN"

          SERVER_TYPE="${{ needs.create-runner.outputs.server_type }}"
          LOCATION="${{ needs.create-runner.outputs.location }}"
          SERVER_ID="${{ needs.create-runner.outputs.server_id }}"

          if [ -z "$SERVER_TYPE" ] || [ -z "$LOCATION" ] || [ -z "$SERVER_ID" ]; then
            echo "Missing server info, skipping cost calculation"
            echo "session_cost_eur=0.0000" >> "$GITHUB_OUTPUT"
            echo "session_hours=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get server creation time
          if ! SERVER_INFO=$(curl -s --fail-with-body --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID"); then
            echo "::warning::Failed to query Hetzner server info API. Skipping cost calculation."
            SERVER_INFO='{}'
          fi

          CREATED=$(echo "$SERVER_INFO" | jq -r '.server.created // empty' 2>/dev/null || true)
          HAS_IPV4=$(echo "$SERVER_INFO" | jq -r '.server.public_net.ipv4.ip // empty' 2>/dev/null || true)

          if [ -z "$CREATED" ]; then
            echo "Could not get server creation time, defaulting to minimum billing unit (1h)"
            ELAPSED_HOURS=1
          else
            CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || date -u +%s)
            NOW_TS=$(date -u +%s)
            ELAPSED_SECONDS=$((NOW_TS - CREATED_TS))
            ELAPSED_HOURS=$(( (ELAPSED_SECONDS + 3599) / 3600 ))
            [ "$ELAPSED_HOURS" -lt 1 ] && ELAPSED_HOURS=1
          fi

          # Get pricing
          if ! PRICING=$(curl -s --fail-with-body --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/pricing"); then
            echo "::warning::Failed to query Hetzner pricing API. Skipping cost calculation."
            PRICING='{"pricing":{"server_types":[],"primary_ips":[]}}'
          fi

          HOURLY_RATE=$(echo "$PRICING" | jq -r --arg type "$SERVER_TYPE" --arg loc "$LOCATION" '
            (.pricing.server_types[] | select(.name == $type) |
            .prices[] | select(.location == $loc) |
            .price_hourly.gross) // "0"' 2>/dev/null || echo "0")
          # Guard: jq -r emits the literal string "null" when a field is JSON null.
          # ${:-0} only catches empty/unset — it does NOT sanitise "null". Use regex.
          [[ "$HOURLY_RATE" =~ ^[0-9]+(\.[0-9]+)?$ ]] || HOURLY_RATE="0"

          IPV4_HOURLY="0"
          if [ -n "$HAS_IPV4" ]; then
            IPV4_HOURLY=$(echo "$PRICING" | jq -r --arg loc "$LOCATION" '
              (.pricing.primary_ips[] | select(.type == "ipv4") |
              .prices[] | select(.location == $loc) |
              .price_hourly.gross) // "0"' 2>/dev/null || echo "0")
            [[ "$IPV4_HOURLY" =~ ^[0-9]+(\.[0-9]+)?$ ]] || IPV4_HOURLY="0"
          fi

          SESSION_COST=$(awk "BEGIN {printf \"%.10f\", $ELAPSED_HOURS * ($HOURLY_RATE + $IPV4_HOURLY)}")
          SESSION_COST_FMT=$(awk "BEGIN {printf \"%.4f\", $ELAPSED_HOURS * ($HOURLY_RATE + $IPV4_HOURLY)}")

          echo "Session: ${ELAPSED_HOURS}h × (€$HOURLY_RATE server + €$IPV4_HOURLY IPv4) = €$SESSION_COST_FMT"
          echo "session_cost_eur=$SESSION_COST_FMT" >> "$GITHUB_OUTPUT"
          echo "session_hours=$ELAPSED_HOURS" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Job summary
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          L1_RESULT="${{ steps.l1-check.outputs.l1_result }}"
          L2_RESULT="${{ steps.l2-check.outputs.reproducible }}"
          L1_ICON="❓"; L2_ICON="❓"
          [[ "$L1_RESULT" == "pass" ]] && L1_ICON="✅"
          [[ "$L1_RESULT" == "fail" ]] && L1_ICON="❌"
          [[ "$L1_RESULT" == "skipped" ]] && L1_ICON="⏭️"
          [[ "$L2_RESULT" == "true" ]] && L2_ICON="✅"
          [[ "$L2_RESULT" == "false" ]] && L2_ICON="❌"
          [[ -z "$L2_RESULT" || "$L2_RESULT" == "skipped" ]] && L2_ICON="⏭️"

          printf '## NAILS OS Build Summary\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| Property | Value |\n' >> "$GITHUB_STEP_SUMMARY"
          printf '|----------|-------|\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| **ISO filename** | `%s` |\n' "${{ steps.build-iso.outputs.iso_filename }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **ISO SHA256** | `%s` |\n' "${{ steps.build-iso.outputs.iso_sha256 }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **ISO size** | %s MB |\n' "$(( ${{ steps.build-iso.outputs.iso_size || 0 }} / 1048576 ))" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Build duration** | %ss |\n' "${{ steps.build-iso.outputs.build_duration }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Server** | %s @ %s |\n' "${{ needs.create-runner.outputs.server_type }}" "${{ needs.create-runner.outputs.location }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **L1 (same-store)** | %s %s |\n' "${L1_ICON}" "${L1_RESULT:-not run}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **L2 (full rebuild)** | %s %s |\n' "${L2_ICON}" "${L2_RESULT:-not run}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **SBOM components** | %s |\n' "${{ steps.sbom-validate.outputs.component_count || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Vulnerability scan** | `%s` |\n' "${{ steps.vuln-policy.outputs.summary || 'not-run' }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Commit** | `%s` |\n' "${EFFECTIVE_CHECKOUT_SHA}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Ref** | `%s` |\n' "${EFFECTIVE_CHECKOUT_REF}" >> "$GITHUB_STEP_SUMMARY"
          printf '| **Session cost** | ~€%s (%sh) |\n' "${{ steps.session-cost.outputs.session_cost_eur }}" "${{ steps.session-cost.outputs.session_hours }}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n### Security artifacts\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- SBOM: `dist/nails-os-sbom.cdx.json` (uploaded to artifact store, 90-day retention)\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- Vulnerability report: `dist/vulnix-results.json` (uploaded to artifact store, 90-day retention)\n' >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Job 3: Destroy the Hetzner Cloud server
  # ===========================================================================
  # MUST run unconditionally (if: always()) to prevent orphaned servers that
  # would continue to accrue charges. This is the billing safety net.
  # ===========================================================================
  delete-runner:
    needs: [resolve-run-context, create-runner, build-and-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - name: Track cumulative cost
        if: needs.create-runner.outputs.server_id != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${HCLOUD_TOKEN:-}" ]] && echo "::add-mask::$HCLOUD_TOKEN"
          [[ -n "${GH_TOKEN:-}" ]] && echo "::add-mask::$GH_TOKEN"

          SERVER_TYPE="${{ needs.create-runner.outputs.server_type }}"
          LOCATION="${{ needs.create-runner.outputs.location }}"
          SERVER_ID="${{ needs.create-runner.outputs.server_id }}"
          REPO="${{ github.repository }}"

          # Calculate this session's cost
          if ! SERVER_INFO=$(curl -s --fail-with-body --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID"); then
            echo "::warning::Failed to query Hetzner server info API. Using defaults."
            SERVER_INFO='{}'
          fi

          CREATED=$(echo "$SERVER_INFO" | jq -r '.server.created // empty' 2>/dev/null || true)
          HAS_IPV4=$(echo "$SERVER_INFO" | jq -r '.server.public_net.ipv4.ip // empty' 2>/dev/null || true)

          if [ -z "$CREATED" ]; then
            echo "Could not determine server creation time, using 1h estimate"
            ELAPSED_HOURS=1
          else
            CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || date -u +%s)
            NOW_TS=$(date -u +%s)
            ELAPSED_SECONDS=$((NOW_TS - CREATED_TS))
            ELAPSED_HOURS=$(( (ELAPSED_SECONDS + 3599) / 3600 ))
            [ "$ELAPSED_HOURS" -lt 1 ] && ELAPSED_HOURS=1
          fi

          if ! PRICING=$(curl -s --fail-with-body --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/pricing"); then
            echo "::warning::Failed to query Hetzner pricing API. Using defaults."
            PRICING='{"pricing":{"server_types":[],"primary_ips":[]}}'
          fi

          HOURLY_RATE=$(echo "$PRICING" | jq -r --arg type "$SERVER_TYPE" --arg loc "$LOCATION" '
            (.pricing.server_types[] | select(.name == $type) |
            .prices[] | select(.location == $loc) |
            .price_hourly.gross) // "0"' 2>/dev/null || echo "0")
          # Guard: jq -r emits the literal string "null" when a field is JSON null.
          # ${:-0} only catches empty/unset — it does NOT sanitise "null". Use regex.
          [[ "$HOURLY_RATE" =~ ^[0-9]+(\.[0-9]+)?$ ]] || HOURLY_RATE="0"

          IPV4_HOURLY="0"
          if [ -n "$HAS_IPV4" ]; then
            IPV4_HOURLY=$(echo "$PRICING" | jq -r --arg loc "$LOCATION" '
              (.pricing.primary_ips[] | select(.type == "ipv4") |
              .prices[] | select(.location == $loc) |
              .price_hourly.gross) // "0"' 2>/dev/null || echo "0")
            [[ "$IPV4_HOURLY" =~ ^[0-9]+(\.[0-9]+)?$ ]] || IPV4_HOURLY="0"
          fi

          SESSION_COST=$(awk "BEGIN {printf \"%.10f\", $ELAPSED_HOURS * ($HOURLY_RATE + $IPV4_HOURLY)}")
          SESSION_COST_FMT=$(awk "BEGIN {printf \"%.4f\", $ELAPSED_HOURS * ($HOURLY_RATE + $IPV4_HOURLY)}")

          # Read current cumulative cost from GitHub variable (JSON: {"month":"YYYY-MM","total":"X.XXXX"})
          CURRENT_MONTH=$(date -u +%Y-%m)
          CURRENT_TOTAL="0.0000"
          _raw=$(gh api "repos/$REPO/actions/variables/HETZNER_CUMULATIVE_COST_EUR" \
            --jq '.value' 2>/dev/null) || true
          if [ -n "$_raw" ]; then
            _stored_month=$(echo "$_raw" | jq -r '.month // empty' 2>/dev/null) || true
            _stored_total=$(echo "$_raw" | jq -r '.total // empty' 2>/dev/null) || true
            if [ "$_stored_month" = "$CURRENT_MONTH" ] && [[ "${_stored_total:-}" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
              CURRENT_TOTAL="$_stored_total"
            else
              echo "Month mismatch or invalid data — resetting cumulative total for $CURRENT_MONTH"
            fi
          fi

          # Calculate new total
          NEW_TOTAL=$(awk "BEGIN {printf \"%.10f\", $CURRENT_TOTAL + $SESSION_COST}")
          NEW_TOTAL_FMT=$(awk "BEGIN {printf \"%.4f\", $CURRENT_TOTAL + $SESSION_COST}")

          echo "Session cost: €$SESSION_COST_FMT (${ELAPSED_HOURS}h × $SERVER_TYPE @ $LOCATION)"
          echo "Month: $CURRENT_MONTH"
          echo "Previous cumulative: €$CURRENT_TOTAL"
          echo "New cumulative: €$NEW_TOTAL_FMT"

          # Write back as JSON with current month
          NEW_VALUE=$(jq -n --arg month "$CURRENT_MONTH" --arg total "$NEW_TOTAL_FMT" \
            '{"month":$month,"total":$total}')

          # Update the repository variable (create if it doesn't exist)
          if gh api "repos/$REPO/actions/variables/HETZNER_CUMULATIVE_COST_EUR" &>/dev/null; then
            gh api -X PATCH "repos/$REPO/actions/variables/HETZNER_CUMULATIVE_COST_EUR" \
              -f value="$NEW_VALUE" \
              || echo "::warning::Failed to PATCH HETZNER_CUMULATIVE_COST_EUR. Cost not persisted."
          else
            gh api -X POST "repos/$REPO/actions/variables" \
              -f name="HETZNER_CUMULATIVE_COST_EUR" \
              -f value="$NEW_VALUE" \
              || echo "::warning::Failed to POST HETZNER_CUMULATIVE_COST_EUR. Cost not persisted."
          fi

          # Write cost summary to job summary
          BUDGET_REMAINING=$(awk "BEGIN {printf \"%.4f\", 20.00 - $NEW_TOTAL}")
          {
            printf '## Cost Summary (%s)\n\n' "$CURRENT_MONTH"
            printf '| Metric | Value |\n'
            printf '|--------|-------|\n'
            printf '| **This session** | ~€%s (%sh × %s @ %s) |\n' "$SESSION_COST_FMT" "$ELAPSED_HOURS" "$SERVER_TYPE" "$LOCATION"
            printf '| **Cumulative total** | ~€%s |\n' "$NEW_TOTAL_FMT"
            printf '| **Budget** | €20.00 |\n'
            printf '| **Budget remaining** | ~€%s |\n' "$BUDGET_REMAINING"
            printf '\n> Estimates based on Hetzner pricing API. Actual invoiced amounts may differ.\n'
            printf '> Cumulative total resets automatically each calendar month (UTC).\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete Hetzner Cloud runner
        if: needs.create-runner.outputs.server_id != ''
        uses: Cyclenerd/hcloud-github-runner@1d464319145d45966cd0344f3e2038cf2152dc1d  # v1.3.0
        with:
          mode: delete
          name: ${{ needs.create-runner.outputs.label }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}

  hetzner-iso-result:
    name: Hetzner ISO Result
    needs:
      - resolve-run-context
      - python-tests
      - create-runner
      - build-and-verify
      - delete-runner
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve workflow outcome
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          RUN_MODE: ${{ needs.resolve-run-context.outputs.run_mode }}
          TRUST_REASON: ${{ needs.resolve-run-context.outputs.reason }}
          RESOLVE_RESULT: ${{ needs.resolve-run-context.result }}
          PYTHON_TESTS_RESULT: ${{ needs.python-tests.result }}
          CREATE_RUNNER_RESULT: ${{ needs.create-runner.result }}
          BUILD_RESULT: ${{ needs.build-and-verify.result }}
          DELETE_RUNNER_RESULT: ${{ needs.delete-runner.result }}
        run: |
          set -euo pipefail

          {
            cat <<'EOF'
          ## Hetzner ISO workflow result

          | Job | Result |
          |---|---|
          EOF
            printf '| Run mode | `%s` |\n' "${RUN_MODE:-unknown}"
            printf '| Resolve trusted run context | `%s` |\n' "${RESOLVE_RESULT}"
            printf '| Python unit tests | `%s` |\n' "${PYTHON_TESTS_RESULT}"
            printf '| Create Hetzner runner | `%s` |\n' "${CREATE_RUNNER_RESULT}"
            printf '| Build and verify ISO | `%s` |\n' "${BUILD_RESULT}"
            printf '| Delete Hetzner runner | `%s` |\n' "${DELETE_RUNNER_RESULT}"
            printf '\n%s\n' "${TRUST_REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${RESOLVE_RESULT}" != 'success' ]]; then
            echo "::error::Failed to resolve a trusted checkout target."
            exit 1
          fi

          if [[ "${PYTHON_TESTS_RESULT}" != 'success' ]]; then
            echo "::error::Python unit tests did not complete successfully."
            exit 1
          fi

          if [[ "${CREATE_RUNNER_RESULT}" != 'success' ]]; then
            echo "::error::Hetzner runner provisioning did not complete successfully."
            exit 1
          fi

          if [[ "${BUILD_RESULT}" != 'success' ]]; then
            echo "::error::The Hetzner ISO build-and-verify job did not complete successfully."
            exit 1
          fi

          if [[ "${DELETE_RUNNER_RESULT}" != 'success' ]]; then
            echo "::error::Hetzner runner cleanup did not complete successfully."
            exit 1
          fi

          echo "Hetzner ISO workflow completed successfully."
