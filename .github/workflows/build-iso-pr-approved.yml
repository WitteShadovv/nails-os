name: Build NAILS OS ISO (PR approved)
run-name: >-
  Approved PR ISO build #${{ inputs.pr_number }}${{ inputs.checkout_sha != '' && format(' @ {0}', inputs.checkout_sha) || '' }}

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Approved pull request number"
        required: true
        type: string
      checkout_sha:
        description: "Optional exact PR head SHA expected at run time"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-iso-pr-approved-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  resolve-run-context:
    name: Revalidate approved PR run context
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      run_mode: ${{ steps.resolve.outputs.run_mode }}
      reason: ${{ steps.resolve.outputs.reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_sha: ${{ steps.resolve.outputs.checkout_sha }}
      comparison_base_sha: ${{ steps.resolve.outputs.comparison_base_sha }}
      changed_files: ${{ steps.resolve.outputs.changed_files }}
    steps:
      - name: Revalidate exact approved PR head
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_CHECKOUT_SHA: ${{ inputs.checkout_sha }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          pr_number = os.environ["INPUT_PR_NUMBER"]
          expected_checkout_sha = os.environ.get("INPUT_CHECKOUT_SHA", "")

          def write_output(name, value):
              value = "" if value is None else str(value)
              with open(output_path, "a", encoding="utf-8") as fh:
                  if "\n" in value:
                      fh.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{name}={value}\n")

          def api_get(path):
              request = urllib.request.Request(
                  f"{api_url}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          def is_full_sha(value):
              return bool(re.fullmatch(r"[0-9a-f]{40}", value or ""))

          if not pr_number.isdigit():
              raise SystemExit(f"Invalid pull request number: {pr_number!r}")
          if expected_checkout_sha and not is_full_sha(expected_checkout_sha):
              raise SystemExit(f"Invalid checkout SHA: {expected_checkout_sha!r}")

          pr = api_get(f"/repos/{repo}/pulls/{pr_number}")
          if pr["state"] != "open":
              raise SystemExit(f"PR #{pr_number} is no longer open.")
          if pr["base"]["ref"] != "main":
              raise SystemExit(f"PR #{pr_number} no longer targets main.")

          live_checkout_repository = pr["head"]["repo"]["full_name"]
          live_checkout_ref = pr["head"]["ref"]
          live_checkout_sha = pr["head"]["sha"]
          live_base_sha = pr["base"]["sha"]

          if expected_checkout_sha and live_checkout_sha != expected_checkout_sha:
              raise SystemExit(
                  f"Expected checkout SHA {expected_checkout_sha} no longer matches live PR SHA {live_checkout_sha}."
              )

          changed_files = []
          page = 1
          executable_statuses = {"added", "copied", "modified", "renamed"}
          while True:
              page_items = api_get(f"/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}")
              if not page_items:
                  break
              changed_files.extend(page_items)
              if len(page_items) < 100:
                  break
              page += 1

          changed_paths = [
              item["filename"]
              for item in changed_files
              if item.get("status", "") in executable_statuses
          ]
          reason = (
              f"Trusted manually dispatched PR build for PR #{pr_number}; exact live head SHA {live_checkout_sha} was revalidated before Hetzner provisioning."
          )

          write_output("run_mode", "pr")
          write_output("reason", reason)
          write_output("pr_number", pr_number)
          write_output("checkout_repository", live_checkout_repository)
          write_output("checkout_ref", live_checkout_ref)
          write_output("checkout_sha", live_checkout_sha)
          write_output("comparison_base_sha", live_base_sha)
          write_output("changed_files", "\n".join(changed_paths))

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Revalidated approved PR build context\n\n")
              summary.write("This workflow is manual-only. It is not reachable automatically from `pull_request_target`.\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| PR number | `#{pr_number}` |\n")
              summary.write(f"| Checkout repository | `{live_checkout_repository}` |\n")
              summary.write(f"| Checkout ref | `{live_checkout_ref}` |\n")
              summary.write(f"| Checkout SHA | `{live_checkout_sha}` |\n")
              summary.write(f"| Expected checkout SHA input | `{expected_checkout_sha or 'n/a'}` |\n")
              summary.write(f"| Live base SHA | `{live_base_sha}` |\n")
              summary.write(f"| Changed files provided to build engine | `{len(changed_paths)}` |\n")
              summary.write(f"| Reason | {reason} |\n")
          PY

  await-build-approval:
    name: Await Hetzner PR build approval
    needs: resolve-run-context
    if: needs.resolve-run-context.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: hetzner-pr
    steps:
      - name: Confirm trusted manual dispatch boundary
        run: |
          {
            cat <<'EOF'
          ## Trusted manual PR build approval

          This job is approval-only. The privileged Hetzner build will start only after this environment is approved for the manually dispatched workflow.
          EOF
          } >> "$GITHUB_STEP_SUMMARY"

  build-iso:
    name: Build approved PR on Hetzner
    needs: [resolve-run-context, await-build-approval]
    if: needs.resolve-run-context.result == 'success' && needs.await-build-approval.result == 'success'
    uses: ./.github/workflows/build-iso.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      verify_reproducibility: false
      r2_prefix: latest
      checkout_repository: ${{ needs.resolve-run-context.outputs.checkout_repository }}
      checkout_ref: ${{ needs.resolve-run-context.outputs.checkout_ref }}
      checkout_sha: ${{ needs.resolve-run-context.outputs.checkout_sha }}
      comparison_base_sha: ${{ needs.resolve-run-context.outputs.comparison_base_sha }}
      changed_files: ${{ needs.resolve-run-context.outputs.changed_files }}
      pr_number: ${{ needs.resolve-run-context.outputs.pr_number }}
      trusted_reason: ${{ needs.resolve-run-context.outputs.reason }}
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      HCLOUD_SSH_KEY_ID: ${{ secrets.HCLOUD_SSH_KEY_ID }}

  trusted-pr-approved-result:
    name: Trusted approved PR ISO result
    needs: [resolve-run-context, await-build-approval, build-iso]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check workflow outcome
        env:
          RESOLVE_RESULT: ${{ needs.resolve-run-context.result }}
          APPROVAL_RESULT: ${{ needs.await-build-approval.result }}
          BUILD_RESULT: ${{ needs.build-iso.result }}
          TRUST_REASON: ${{ needs.resolve-run-context.outputs.reason }}
        run: |
          set -euo pipefail

          {
            cat <<'EOF'
          ## Trusted approved PR ISO workflow result

          | Job | Result |
          |---|---|
          EOF
            printf '%s\n' "| Revalidate approved PR run context | \`${RESOLVE_RESULT}\` |"
            printf '%s\n' "| Await Hetzner PR build approval | \`${APPROVAL_RESULT}\` |"
            printf '%s\n' "| Build approved PR on Hetzner | \`${BUILD_RESULT}\` |"
            printf '%s\n' "" "${TRUST_REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$RESOLVE_RESULT" != 'success' ]]; then
            echo "::error::Failed to revalidate the approved PR context."
            exit 1
          fi

          if [[ "$APPROVAL_RESULT" != 'success' ]]; then
            echo "::error::Trusted manual PR build approval did not complete successfully."
            exit 1
          fi

          if [[ "$BUILD_RESULT" != 'success' ]]; then
            echo "::error::The trusted approved PR Hetzner build did not complete successfully."
            exit 1
          fi

          echo "Trusted approved PR ISO workflow completed successfully."
