name: Build NAILS OS ISO (PR approved)
run-name: >-
  Approved PR ISO build #${{ inputs.pr_number }} @ ${{ inputs.checkout_sha }}
  (gate run ${{ inputs.source_run_id }} attempt ${{ inputs.source_run_attempt }})

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Approved pull request number"
        required: true
        type: string
      checkout_repository:
        description: "Approved PR head repository"
        required: true
        type: string
      checkout_ref:
        description: "Approved PR head ref"
        required: true
        type: string
      checkout_sha:
        description: "Approved PR head SHA"
        required: true
        type: string
      comparison_base_sha:
        description: "PR base SHA captured at approval time"
        required: true
        type: string
      source_run_id:
        description: "Metadata gate workflow run id"
        required: true
        type: string
      source_run_attempt:
        description: "Metadata gate workflow run attempt"
        required: true
        type: string
      source_artifact_name:
        description: "Approval context artifact name from the gate run"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: build-iso-pr-approved-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  resolve-run-context:
    name: Revalidate approved PR run context
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      run_mode: ${{ steps.resolve.outputs.run_mode }}
      reason: ${{ steps.resolve.outputs.reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_sha: ${{ steps.resolve.outputs.checkout_sha }}
      comparison_base_sha: ${{ steps.resolve.outputs.comparison_base_sha }}
      changed_files: ${{ steps.resolve.outputs.changed_files }}
    steps:
      - name: Revalidate exact approved PR head
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_CHECKOUT_REPOSITORY: ${{ inputs.checkout_repository }}
          INPUT_CHECKOUT_REF: ${{ inputs.checkout_ref }}
          INPUT_CHECKOUT_SHA: ${{ inputs.checkout_sha }}
          INPUT_COMPARISON_BASE_SHA: ${{ inputs.comparison_base_sha }}
          INPUT_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          INPUT_SOURCE_RUN_ATTEMPT: ${{ inputs.source_run_attempt }}
          INPUT_SOURCE_ARTIFACT_NAME: ${{ inputs.source_artifact_name }}
        run: |
          python3 <<'PY'
          import io
          import json
          import os
          import re
          import time
          import zipfile
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          pr_number = os.environ["INPUT_PR_NUMBER"]
          checkout_repository = os.environ["INPUT_CHECKOUT_REPOSITORY"]
          checkout_ref = os.environ["INPUT_CHECKOUT_REF"]
          checkout_sha = os.environ["INPUT_CHECKOUT_SHA"]
          comparison_base_sha = os.environ["INPUT_COMPARISON_BASE_SHA"]
          source_run_id = os.environ["INPUT_SOURCE_RUN_ID"]
          source_run_attempt = os.environ["INPUT_SOURCE_RUN_ATTEMPT"]
          source_artifact_name = os.environ["INPUT_SOURCE_ARTIFACT_NAME"]

          def write_output(name, value):
              value = "" if value is None else str(value)
              with open(output_path, "a", encoding="utf-8") as fh:
                  if "\n" in value:
                      fh.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{name}={value}\n")

          def api_get(path):
              request = urllib.request.Request(
                  f"{api_url}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          def api_bytes(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return response.read()

          def is_full_sha(value):
              return bool(re.fullmatch(r"[0-9a-f]{40}", value or ""))

          def is_repo_slug(value):
              return bool(re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", value or ""))

          def is_positive_int(value):
              return bool(re.fullmatch(r"[1-9][0-9]*", value or ""))

          if not pr_number.isdigit():
              raise SystemExit(f"Invalid pull request number: {pr_number!r}")
          if not is_repo_slug(checkout_repository):
              raise SystemExit(f"Invalid checkout repository: {checkout_repository!r}")
          if not checkout_ref:
              raise SystemExit("checkout_ref is required")
          if not is_full_sha(checkout_sha):
              raise SystemExit(f"Invalid checkout SHA: {checkout_sha!r}")
          if not is_full_sha(comparison_base_sha):
              raise SystemExit(f"Invalid comparison base SHA: {comparison_base_sha!r}")
          if not is_positive_int(source_run_id):
              raise SystemExit(f"Invalid source run id: {source_run_id!r}")
          if not is_positive_int(source_run_attempt):
              raise SystemExit(f"Invalid source run attempt: {source_run_attempt!r}")
          if not source_artifact_name:
              raise SystemExit("source_artifact_name is required")

          run = api_get(f"/repos/{repo}/actions/runs/{source_run_id}")
          if str(run.get("id")) != source_run_id:
              raise SystemExit(
                  f"Resolved source run id {run.get('id')} did not match requested run id {source_run_id}."
              )
          run_path = run.get("path") or ""
          if not run_path.startswith(".github/workflows/build-iso-pr-trusted.yml@"):
              raise SystemExit(
                  f"Source run {source_run_id} is not the trusted gate workflow: {run_path!r}"
              )
          if run.get("event") != "pull_request_target":
              raise SystemExit(
                  f"Source run {source_run_id} was triggered by {run.get('event')!r}, expected 'pull_request_target'."
              )
          if str(run.get("run_attempt")) != source_run_attempt:
              raise SystemExit(
                  f"Source run attempt mismatch: expected {source_run_attempt}, got {run.get('run_attempt')!r}."
              )

          poll_deadline = time.time() + 900
          while run.get("status") != "completed":
              if time.time() >= poll_deadline:
                  raise SystemExit(
                      f"Timed out waiting for source gate run {source_run_id} attempt {source_run_attempt} to complete."
                  )
              time.sleep(10)
              run = api_get(f"/repos/{repo}/actions/runs/{source_run_id}")

          if run.get("conclusion") != "success":
              raise SystemExit(
                  f"Source run {source_run_id} did not complete successfully (conclusion={run.get('conclusion')!r})."
              )

          artifacts = api_get(f"/repos/{repo}/actions/runs/{source_run_id}/artifacts")
          artifact = None
          for candidate in artifacts.get("artifacts", []):
              if candidate.get("name") == source_artifact_name:
                  artifact = candidate
                  break
          if artifact is None:
              raise SystemExit(
                  f"Expected approval context artifact {source_artifact_name!r} was not found on source run {source_run_id}."
              )
          if artifact.get("expired"):
              raise SystemExit(
                  f"Approval context artifact {source_artifact_name!r} has expired."
              )
          archive_url = artifact.get("archive_download_url")
          if not archive_url:
              raise SystemExit(
                  f"Approval context artifact {source_artifact_name!r} is missing archive_download_url."
              )

          archive_bytes = api_bytes(archive_url)
          with zipfile.ZipFile(io.BytesIO(archive_bytes)) as archive:
              names = archive.namelist()
              if names != ["approval-context.json"]:
                  raise SystemExit(
                      f"Approval context artifact contents were unexpected: {names!r}"
                  )
              approval_context = json.loads(
                  archive.read("approval-context.json").decode("utf-8")
              )

          expected_context = {
              "schema_version": 1,
              "pr_number": pr_number,
              "checkout_repository": checkout_repository,
              "checkout_ref": checkout_ref,
              "checkout_sha": checkout_sha,
              "comparison_base_sha": comparison_base_sha,
              "source_repository": repo,
              "source_workflow_file": ".github/workflows/build-iso-pr-trusted.yml",
              "source_workflow_name": "Build NAILS OS ISO (PR trusted metadata gate)",
              "source_event_name": "pull_request_target",
              "source_run_id": source_run_id,
              "source_run_attempt": source_run_attempt,
              "source_environment": "hetzner-pr",
              "source_job_name": "Await Hetzner PR approval",
              "source_artifact_name": source_artifact_name,
              "metadata_only": True,
          }
          for key, expected_value in expected_context.items():
              actual_value = approval_context.get(key)
              if actual_value != expected_value:
                  raise SystemExit(
                      f"Approval context mismatch for {key!r}: expected {expected_value!r}, got {actual_value!r}."
                  )

          pr = api_get(f"/repos/{repo}/pulls/{pr_number}")
          if pr["state"] != "open":
              raise SystemExit(f"PR #{pr_number} is no longer open.")
          if pr["base"]["ref"] != "main":
              raise SystemExit(f"PR #{pr_number} no longer targets main.")

          live_checkout_repository = pr["head"]["repo"]["full_name"]
          live_checkout_ref = pr["head"]["ref"]
          live_checkout_sha = pr["head"]["sha"]
          live_base_sha = pr["base"]["sha"]

          if live_checkout_repository != checkout_repository:
              raise SystemExit(
                  f"Approved repository {checkout_repository} no longer matches live PR repository {live_checkout_repository}."
              )
          if live_checkout_ref != checkout_ref:
              raise SystemExit(
                  f"Approved ref {checkout_ref} no longer matches live PR ref {live_checkout_ref}."
              )
          if live_checkout_sha != checkout_sha:
              raise SystemExit(
                  f"Approved SHA {checkout_sha} no longer matches live PR SHA {live_checkout_sha}."
              )

          changed_files = []
          page = 1
          executable_statuses = {"added", "copied", "modified", "renamed"}
          while True:
              page_items = api_get(f"/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}")
              if not page_items:
                  break
              changed_files.extend(page_items)
              if len(page_items) < 100:
                  break
              page += 1

          changed_paths = [
              item["filename"]
              for item in changed_files
              if item.get("status", "") in executable_statuses
          ]
          base_sha_stale = comparison_base_sha != live_base_sha
          effective_base_sha = live_base_sha
          reason = (
              f"Trusted approved PR build for PR #{pr_number}; exact reviewed head SHA {checkout_sha} was revalidated before Hetzner provisioning."
          )

          write_output("run_mode", "pr")
          write_output("reason", reason)
          write_output("pr_number", pr_number)
          write_output("checkout_repository", checkout_repository)
          write_output("checkout_ref", checkout_ref)
          write_output("checkout_sha", checkout_sha)
          write_output("comparison_base_sha", effective_base_sha)
          write_output("changed_files", "\n".join(changed_paths))

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Revalidated approved PR build context\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| Source gate run | `{source_run_id}` |\n")
              summary.write(f"| Source gate attempt | `{source_run_attempt}` |\n")
              summary.write(f"| Approval context artifact | `{source_artifact_name}` |\n")
              summary.write(f"| Source run path | `{run_path}` |\n")
              summary.write(f"| PR number | `#{pr_number}` |\n")
              summary.write(f"| Checkout repository | `{checkout_repository}` |\n")
              summary.write(f"| Checkout ref | `{checkout_ref}` |\n")
              summary.write(f"| Checkout SHA | `{checkout_sha}` |\n")
              summary.write(f"| Approved base SHA | `{comparison_base_sha}` |\n")
              summary.write(f"| Live base SHA | `{live_base_sha}` |\n")
              summary.write(f"| Base SHA changed since approval | `{'true' if base_sha_stale else 'false'}` |\n")
              summary.write(f"| Effective comparison base SHA | `{effective_base_sha}` |\n")
              summary.write(f"| Changed files provided to build engine | `{len(changed_paths)}` |\n")
              summary.write(f"| Reason | {reason} |\n")
          PY

  build-iso:
    name: Build approved PR on Hetzner
    needs: resolve-run-context
    if: needs.resolve-run-context.result == 'success'
    uses: ./.github/workflows/build-iso.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      verify_reproducibility: false
      r2_prefix: latest
      checkout_repository: ${{ needs.resolve-run-context.outputs.checkout_repository }}
      checkout_ref: ${{ needs.resolve-run-context.outputs.checkout_ref }}
      checkout_sha: ${{ needs.resolve-run-context.outputs.checkout_sha }}
      comparison_base_sha: ${{ needs.resolve-run-context.outputs.comparison_base_sha }}
      changed_files: ${{ needs.resolve-run-context.outputs.changed_files }}
      pr_number: ${{ needs.resolve-run-context.outputs.pr_number }}
      trusted_reason: ${{ needs.resolve-run-context.outputs.reason }}
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      HCLOUD_SSH_KEY_ID: ${{ secrets.HCLOUD_SSH_KEY_ID }}

  trusted-pr-approved-result:
    name: Trusted approved PR ISO result
    needs: [resolve-run-context, build-iso]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check workflow outcome
        env:
          RESOLVE_RESULT: ${{ needs.resolve-run-context.result }}
          BUILD_RESULT: ${{ needs.build-iso.result }}
          TRUST_REASON: ${{ needs.resolve-run-context.outputs.reason }}
        run: |
          set -euo pipefail

          {
            cat <<'EOF'
          ## Trusted approved PR ISO workflow result

          | Job | Result |
          |---|---|
          EOF
            printf '| Revalidate approved PR run context | `%s` |\n' "${RESOLVE_RESULT}"
            printf '| Build approved PR on Hetzner | `%s` |\n' "${BUILD_RESULT}"
            printf '\n%s\n' "${TRUST_REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$RESOLVE_RESULT" != 'success' ]]; then
            echo "::error::Failed to revalidate the approved PR context."
            exit 1
          fi

          if [[ "$BUILD_RESULT" != 'success' ]]; then
            echo "::error::The trusted approved PR Hetzner build did not complete successfully."
            exit 1
          fi

          echo "Trusted approved PR ISO workflow completed successfully."
