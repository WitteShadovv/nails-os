name: Build NAILS OS ISO (PR trusted metadata gate)

on:
  pull_request_target:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
    paths:
      - 'nix-config/**'
      - '.github/workflows/build-iso.yml'
      - '.github/workflows/build-iso-pr.yml'
      - '.github/workflows/build-iso-main.yml'
      - '.github/workflows/build-iso-pr-safe.yml'
      - '.github/workflows/build-iso-pr-trusted.yml'
      - '.github/workflows/release.yml'
      - '.pre-commit-config.yaml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-iso-pr-trusted-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approve-pr:
    name: Await Hetzner PR approval
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      approved_pr_number: ${{ steps.record-approval.outputs.approved_pr_number }}
      approved_head_repository: ${{ steps.record-approval.outputs.approved_head_repository }}
      approved_head_ref: ${{ steps.record-approval.outputs.approved_head_ref }}
      approved_head_sha: ${{ steps.record-approval.outputs.approved_head_sha }}
    environment:
      name: hetzner-pr
    steps:
      - name: Record approval gate context
        id: record-approval
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          {
            cat <<'EOF'
          ## Hetzner PR approval

          This job is metadata-only. It does not check out or execute PR code.

          | Property | Value |
          |---|---|
          EOF
            printf '| PR | `#%s` |\n' "$PR_NUMBER"
            printf '| Head repository | `%s` |\n' "$HEAD_REPOSITORY"
            printf '| Head ref | `%s` |\n' "$HEAD_REF"
            printf '| Head SHA | `%s` |\n' "$HEAD_SHA"
            printf '| Base branch | `%s` |\n' "$BASE_REF"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            printf 'approved_pr_number=%s\n' "$PR_NUMBER"
            printf 'approved_head_repository=%s\n' "$HEAD_REPOSITORY"
            printf 'approved_head_ref=%s\n' "$HEAD_REF"
            printf 'approved_head_sha=%s\n' "$HEAD_SHA"
          } >> "$GITHUB_OUTPUT"

  resolve-run-context:
    name: Resolve trusted run context
    needs: [approve-pr]
    if: ${{ always() && (github.event_name != 'pull_request_target' || needs.approve-pr.result == 'success') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      run_mode: ${{ steps.resolve.outputs.run_mode }}
      reason: ${{ steps.resolve.outputs.reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_sha: ${{ steps.resolve.outputs.checkout_sha }}
      comparison_base_sha: ${{ steps.resolve.outputs.comparison_base_sha }}
    steps:
      - name: Resolve trusted checkout target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          APPROVED_PR_NUMBER: ${{ needs.approve-pr.outputs.approved_pr_number }}
          APPROVED_HEAD_REPOSITORY: ${{ needs.approve-pr.outputs.approved_head_repository }}
          APPROVED_HEAD_REF: ${{ needs.approve-pr.outputs.approved_head_ref }}
          APPROVED_HEAD_SHA: ${{ needs.approve-pr.outputs.approved_head_sha }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          event_name = os.environ["EVENT_NAME"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          run_mode = ""
          reason = ""
          pr_number = os.environ.get("APPROVED_PR_NUMBER", "")
          approved_head_repository = os.environ.get("APPROVED_HEAD_REPOSITORY", "")
          approved_head_ref = os.environ.get("APPROVED_HEAD_REF", "")
          approved_head_sha = os.environ.get("APPROVED_HEAD_SHA", "")
          checkout_repository = repo
          checkout_ref = os.environ["GITHUB_REF"]
          checkout_sha = os.environ["GITHUB_SHA"]
          comparison_base_sha = ""

          def write_output(name, value):
              value = "" if value is None else str(value)
              with open(output_path, "a", encoding="utf-8") as fh:
                  if "\n" in value:
                      fh.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{name}={value}\n")

          def api_get(path):
              request = urllib.request.Request(
                  f"{api_url}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          def is_full_sha(value):
              return bool(re.fullmatch(r"[0-9a-f]{40}", value or ""))

          def is_repo_slug(value):
              return bool(re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", value or ""))

          if event_name == "pull_request_target":
              if not pr_number.isdigit():
                  raise SystemExit(f"Invalid pull request number: {pr_number!r}")
              if not is_repo_slug(approved_head_repository):
                  raise SystemExit(f"Invalid approved head repository: {approved_head_repository!r}")
              if not approved_head_ref:
                  raise SystemExit("Approved head ref is required")
              if not is_full_sha(approved_head_sha):
                  raise SystemExit(f"Invalid approved head SHA: {approved_head_sha!r}")
              pr = api_get(f"/repos/{repo}/pulls/{pr_number}")
              if pr["state"] != "open":
                  raise SystemExit(f"PR #{pr_number} is no longer open.")
              if pr["base"]["ref"] != "main":
                  raise SystemExit(f"PR #{pr_number} no longer targets main.")
              live_head_repository = pr["head"]["repo"]["full_name"]
              live_head_ref = pr["head"]["ref"]
              live_head_sha = pr["head"]["sha"]
              if live_head_repository != approved_head_repository:
                  raise SystemExit(
                      f"PR #{pr_number} head repository changed after approval: approved {approved_head_repository}, current {live_head_repository}. Re-run the workflow and re-approve the current head repository/SHA."
                  )
              if live_head_ref != approved_head_ref:
                  raise SystemExit(
                      f"PR #{pr_number} head ref changed after approval: approved {approved_head_ref}, current {live_head_ref}. Re-run the workflow and re-approve the current head ref/SHA."
                  )
              if live_head_sha != approved_head_sha:
                  raise SystemExit(
                      f"PR #{pr_number} head SHA changed after approval: approved {approved_head_sha}, current {live_head_sha}. Re-run the workflow and re-approve the current head SHA."
                  )
              checkout_repository = approved_head_repository
              checkout_ref = approved_head_ref
              checkout_sha = approved_head_sha
              comparison_base_sha = pr["base"]["sha"]
              run_mode = "pr"
              reason = (
                  f"Approved pull_request_target run for PR #{pr_number}; provisioning the Hetzner-backed ISO builder for reviewed head SHA {approved_head_sha} is allowed."
              )
          else:
              raise SystemExit(
                  f"Event `{event_name}` is not allowed for the trusted PR Hetzner ISO wrapper."
              )

          write_output("run_mode", run_mode)
          write_output("reason", reason)
          write_output("pr_number", pr_number)
          write_output("checkout_repository", checkout_repository)
          write_output("checkout_ref", checkout_ref)
          write_output("checkout_sha", checkout_sha)
          write_output("comparison_base_sha", comparison_base_sha)

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Trusted run context\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| Event | `{event_name}` |\n")
              summary.write(f"| Run mode | `{run_mode}` |\n")
              summary.write(f"| PR number | `{pr_number or 'n/a'}` |\n")
              summary.write(f"| Checkout repository | `{checkout_repository}` |\n")
              summary.write(f"| Checkout ref | `{checkout_ref}` |\n")
              summary.write(f"| Checkout SHA | `{checkout_sha}` |\n")
              summary.write(f"| Comparison base SHA | `{comparison_base_sha or 'n/a'}` |\n")
              summary.write(f"| Reason | {reason} |\n")
          PY

  build-iso:
    name: Build approved PR on Hetzner
    needs: resolve-run-context
    if: needs.resolve-run-context.result == 'success'
    uses: ./.github/workflows/build-iso.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      verify_reproducibility: false
      r2_prefix: latest
      checkout_repository: ${{ needs.resolve-run-context.outputs.checkout_repository }}
      checkout_ref: ${{ needs.resolve-run-context.outputs.checkout_ref }}
      checkout_sha: ${{ needs.resolve-run-context.outputs.checkout_sha }}
      comparison_base_sha: ${{ needs.resolve-run-context.outputs.comparison_base_sha }}
      pr_number: ${{ needs.resolve-run-context.outputs.pr_number }}
      trusted_reason: ${{ needs.resolve-run-context.outputs.reason }}
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      HCLOUD_SSH_KEY_ID: ${{ secrets.HCLOUD_SSH_KEY_ID }}

  trusted-pr-result:
    name: Trusted PR ISO result
    needs: [approve-pr, resolve-run-context, build-iso]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check workflow outcome
        env:
          APPROVAL_RESULT: ${{ needs.approve-pr.result }}
          RESOLVE_RESULT: ${{ needs.resolve-run-context.result }}
          TRUST_REASON: ${{ needs.resolve-run-context.outputs.reason }}
          RUN_MODE: ${{ needs.resolve-run-context.outputs.run_mode }}
          BUILD_RESULT: ${{ needs.build-iso.result }}
        run: |
          set -euo pipefail

          {
            cat <<'EOF'
          ## Trusted PR ISO workflow result

          | Job | Result |
          |---|---|
          EOF
            printf '| Run mode | `%s` |\n' "${RUN_MODE}"
            printf '| PR approval gate | `%s` |\n' "${APPROVAL_RESULT}"
            printf '| Resolve trusted run context | `%s` |\n' "${RESOLVE_RESULT}"
            printf '| Build approved PR on Hetzner | `%s` |\n' "${BUILD_RESULT}"
            printf '\n%s\n' "${TRUST_REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$RESOLVE_RESULT" != "success" ]]; then
            echo "::error::Failed to resolve a trusted checkout target."
            exit 1
          fi

          if [[ "$BUILD_RESULT" != "success" ]]; then
            echo "::error::The trusted Hetzner ISO build did not complete successfully."
            exit 1
          fi

          echo "Trusted PR ISO workflow completed successfully."
