name: Build NAILS OS ISO (PR trusted metadata gate)

on:
  pull_request_target:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
    paths:
      - 'nix-config/**'
      - '.github/workflows/build-iso.yml'
      - '.github/workflows/build-iso-pr.yml'
      - '.github/workflows/build-iso-main.yml'
      - '.github/workflows/build-iso-pr-safe.yml'
      - '.github/workflows/build-iso-pr-approved.yml'
      - '.github/workflows/build-iso-pr-trusted.yml'
      - '.github/workflows/release.yml'
      - '.pre-commit-config.yaml'

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: build-iso-pr-trusted-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approve-pr:
    name: Await Hetzner PR approval
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      approved_pr_number: ${{ steps.record-approval.outputs.approved_pr_number }}
      approved_head_repository: ${{ steps.record-approval.outputs.approved_head_repository }}
      approved_head_ref: ${{ steps.record-approval.outputs.approved_head_ref }}
      approved_head_sha: ${{ steps.record-approval.outputs.approved_head_sha }}
      approved_base_sha: ${{ steps.record-approval.outputs.approved_base_sha }}
      approval_artifact_name: ${{ steps.record-approval.outputs.approval_artifact_name }}
    environment:
      name: hetzner-pr
    steps:
      - name: Record approval gate context
        id: record-approval
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_WORKFLOW_NAME: ${{ github.workflow }}
          SOURCE_EVENT_NAME: ${{ github.event_name }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          APPROVAL_CONTEXT_DIR: ${{ runner.temp }}/approval-context
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          source_workflow_name = os.environ["SOURCE_WORKFLOW_NAME"]
          source_event_name = os.environ["SOURCE_EVENT_NAME"]
          source_run_id = os.environ["SOURCE_RUN_ID"]
          source_run_attempt = os.environ["SOURCE_RUN_ATTEMPT"]
          approval_context_dir = Path(os.environ["APPROVAL_CONTEXT_DIR"])
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          def write_output(name, value):
              value = "" if value is None else str(value)
              with open(output_path, "a", encoding="utf-8") as fh:
                  if "\n" in value:
                      fh.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{name}={value}\n")

          def api_get(path):
              request = urllib.request.Request(
                  f"{api_url}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          if not pr_number.isdigit():
              raise SystemExit(f"Invalid pull request number: {pr_number!r}")

          pr = api_get(f"/repos/{repo}/pulls/{pr_number}")
          if pr["state"] != "open":
              raise SystemExit(f"PR #{pr_number} is no longer open.")
          if pr["base"]["ref"] != "main":
              raise SystemExit(f"PR #{pr_number} no longer targets main.")

          head_repository = pr["head"]["repo"]["full_name"]
          head_ref = pr["head"]["ref"]
          head_sha = pr["head"]["sha"]
          base_sha = pr["base"]["sha"]
          approval_artifact_name = (
              f"hetzner-pr-approval-context-pr-{pr_number}-run-{source_run_id}-attempt-{source_run_attempt}"
          )
          approval_context_dir.mkdir(parents=True, exist_ok=True)
          approval_context_path = approval_context_dir / "approval-context.json"
          approval_context = {
              "schema_version": 1,
              "pr_number": pr_number,
              "checkout_repository": head_repository,
              "checkout_ref": head_ref,
              "checkout_sha": head_sha,
              "comparison_base_sha": base_sha,
              "source_repository": repo,
              "source_workflow_file": ".github/workflows/build-iso-pr-trusted.yml",
              "source_workflow_name": source_workflow_name,
              "source_event_name": source_event_name,
              "source_run_id": source_run_id,
              "source_run_attempt": source_run_attempt,
              "source_environment": "hetzner-pr",
              "source_job_name": "Await Hetzner PR approval",
              "source_artifact_name": approval_artifact_name,
              "metadata_only": True,
          }
          approval_context_path.write_text(
              json.dumps(approval_context, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          write_output("approved_pr_number", pr_number)
          write_output("approved_head_repository", head_repository)
          write_output("approved_head_ref", head_ref)
          write_output("approved_head_sha", head_sha)
          write_output("approved_base_sha", base_sha)
          write_output("approval_artifact_name", approval_artifact_name)

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Hetzner PR approval\n\n")
              summary.write("This job is metadata-only. It does not check out or execute PR code.\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| PR | `#{pr_number}` |\n")
              summary.write(f"| Head repository | `{head_repository}` |\n")
              summary.write(f"| Head ref | `{head_ref}` |\n")
              summary.write(f"| Head SHA | `{head_sha}` |\n")
              summary.write(f"| Base branch | `{pr['base']['ref']}` |\n")
              summary.write(f"| Base SHA | `{base_sha}` |\n")
              summary.write(f"| Approval context artifact | `{approval_artifact_name}` |\n")
              summary.write("\nAfter approval, this workflow dispatches a separate trusted `workflow_dispatch` build bound to the exact approved PR head repository/ref/SHA.\n")
          PY

      - name: Upload approval context artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: ${{ steps.record-approval.outputs.approval_artifact_name }}
          path: ${{ runner.temp }}/approval-context/approval-context.json
          if-no-files-found: error
          retention-days: 7

  dispatch-approved-build:
    name: Dispatch approved PR ISO build
    needs: approve-pr
    if: needs.approve-pr.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      expected_display_title: ${{ steps.dispatch.outputs.expected_display_title }}
      dispatched_at: ${{ steps.dispatch.outputs.dispatched_at }}
    steps:
      - name: Dispatch trusted child workflow
        id: dispatch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.approve-pr.outputs.approved_pr_number }}
          CHECKOUT_REPOSITORY: ${{ needs.approve-pr.outputs.approved_head_repository }}
          CHECKOUT_REF: ${{ needs.approve-pr.outputs.approved_head_ref }}
          CHECKOUT_SHA: ${{ needs.approve-pr.outputs.approved_head_sha }}
          COMPARISON_BASE_SHA: ${{ needs.approve-pr.outputs.approved_base_sha }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          SOURCE_ARTIFACT_NAME: ${{ needs.approve-pr.outputs.approval_artifact_name }}
        run: |
          python3 <<'PY'
          import datetime
          import json
          import os
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          pr_number = os.environ["PR_NUMBER"]
          checkout_repository = os.environ["CHECKOUT_REPOSITORY"]
          checkout_ref = os.environ["CHECKOUT_REF"]
          checkout_sha = os.environ["CHECKOUT_SHA"]
          comparison_base_sha = os.environ["COMPARISON_BASE_SHA"]
          source_run_id = os.environ["SOURCE_RUN_ID"]
          source_run_attempt = os.environ["SOURCE_RUN_ATTEMPT"]
          source_artifact_name = os.environ["SOURCE_ARTIFACT_NAME"]
          expected_display_title = (
              f"Approved PR ISO build #{pr_number} @ {checkout_sha} (gate run {source_run_id} attempt {source_run_attempt})"
          )
          dispatched_at = datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z")

          payload = json.dumps(
              {
                  "ref": "main",
                  "inputs": {
                      "pr_number": pr_number,
                      "checkout_repository": checkout_repository,
                      "checkout_ref": checkout_ref,
                      "checkout_sha": checkout_sha,
                      "comparison_base_sha": comparison_base_sha,
                      "source_run_id": source_run_id,
                      "source_run_attempt": source_run_attempt,
                      "source_artifact_name": source_artifact_name,
                  },
              }
          ).encode("utf-8")

          request = urllib.request.Request(
              f"{api_url}/repos/{repo}/actions/workflows/build-iso-pr-approved.yml/dispatches",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(request):
              pass

          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"expected_display_title={expected_display_title}\n")
              fh.write(f"dispatched_at={dispatched_at}\n")

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Dispatched trusted child workflow\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| Workflow | `build-iso-pr-approved.yml` |\n")
              summary.write(f"| PR | `#{pr_number}` |\n")
              summary.write(f"| Checkout repository | `{checkout_repository}` |\n")
              summary.write(f"| Checkout ref | `{checkout_ref}` |\n")
              summary.write(f"| Checkout SHA | `{checkout_sha}` |\n")
              summary.write(f"| Comparison base SHA | `{comparison_base_sha}` |\n")
              summary.write(f"| Source gate run | `{source_run_id}` |\n")
              summary.write(f"| Source gate attempt | `{source_run_attempt}` |\n")
              summary.write(f"| Approval context artifact | `{source_artifact_name}` |\n")
          PY

  trusted-pr-result:
    name: Trusted PR ISO result
    needs: [approve-pr, dispatch-approved-build]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check workflow outcome
        env:
          APPROVAL_RESULT: ${{ needs.approve-pr.result }}
          DISPATCH_RESULT: ${{ needs.dispatch-approved-build.result }}
          EXPECTED_DISPLAY_TITLE: ${{ needs.dispatch-approved-build.outputs.expected_display_title }}
        run: |
          set -euo pipefail

          {
            cat <<'EOF'
          ## Trusted PR ISO workflow result

          | Job | Result |
          |---|---|
          EOF
            printf '| Await Hetzner PR approval | `%s` |\n' "${APPROVAL_RESULT}"
            printf '| Dispatch approved PR ISO build | `%s` |\n' "${DISPATCH_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${EXPECTED_DISPLAY_TITLE:-}" ]; then
            printf '\nDispatched child workflow title: `%s`\n' "${EXPECTED_DISPLAY_TITLE}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${APPROVAL_RESULT}" != 'success' ]]; then
            echo "::error::Hetzner PR approval did not complete successfully."
            exit 1
          fi

          if [[ "${DISPATCH_RESULT}" != 'success' ]]; then
            echo "::error::Failed to dispatch the trusted PR ISO build workflow."
            exit 1
          fi

          echo "Trusted PR ISO gate workflow completed successfully and dispatched the child build workflow."
