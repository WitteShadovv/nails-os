name: Build NAILS OS ISO (PR approval gate)

on:
  pull_request_target:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'nix-config/**'
      - '.github/workflows/build-iso.yml'
      - '.github/workflows/build-iso-pr.yml'
      - '.github/workflows/release.yml'
      - '.pre-commit-config.yaml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-iso-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approve-pr:
    name: Await Hetzner PR approval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: hetzner-pr
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_sha: ${{ steps.resolve.outputs.checkout_sha }}
      comparison_base_sha: ${{ steps.resolve.outputs.comparison_base_sha }}
      trusted_reason: ${{ steps.resolve.outputs.trusted_reason }}
    steps:
      - name: Resolve trusted PR metadata after approval
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          if not pr_number.isdigit():
              raise SystemExit(f"Invalid pull request number: {pr_number!r}")

          def write_output(name, value):
              value = "" if value is None else str(value)
              with open(output_path, "a", encoding="utf-8") as fh:
                  if "\n" in value:
                      fh.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{name}={value}\n")

          request = urllib.request.Request(
              f"{api_url}/repos/{repo}/pulls/{pr_number}",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              pr = json.loads(response.read().decode("utf-8"))

          if pr["state"] != "open":
              raise SystemExit(f"PR #{pr_number} is no longer open.")
          if pr["base"]["ref"] != "main":
              raise SystemExit(f"PR #{pr_number} no longer targets main.")

          checkout_repository = pr["head"]["repo"]["full_name"]
          checkout_ref = pr["head"]["ref"]
          checkout_sha = pr["head"]["sha"]
          comparison_base_sha = pr["base"]["sha"]
          trusted_reason = (
              f"Approved PR wrapper resolved PR #{pr_number} to exact head SHA {checkout_sha}; "
              "the reusable build workflow may now check out only that SHA."
          )

          write_output("pr_number", pr_number)
          write_output("checkout_repository", checkout_repository)
          write_output("checkout_ref", checkout_ref)
          write_output("checkout_sha", checkout_sha)
          write_output("comparison_base_sha", comparison_base_sha)
          write_output("trusted_reason", trusted_reason)

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Hetzner PR approval\n\n")
              summary.write("This job is metadata-only. It does not check out or execute PR code.\n\n")
              summary.write("| Property | Value |\n")
              summary.write("|---|---|\n")
              summary.write(f"| PR | `#{pr_number}` |\n")
              summary.write(f"| Head repository | `{checkout_repository}` |\n")
              summary.write(f"| Head ref | `{checkout_ref}` |\n")
              summary.write(f"| Head SHA | `{checkout_sha}` |\n")
              summary.write(f"| Base branch | `{pr['base']['ref']}` |\n")
              summary.write(f"| Base SHA | `{comparison_base_sha}` |\n")
          PY

  build-iso:
    name: Build NAILS OS ISO
    needs: approve-pr
    uses: ./.github/workflows/build-iso.yml
    permissions:
      contents: write
      pull-requests: read
    with:
      verify_reproducibility: false
      r2_prefix: latest
      checkout_repository: ${{ needs.approve-pr.outputs.checkout_repository }}
      checkout_ref: ${{ needs.approve-pr.outputs.checkout_ref }}
      checkout_sha: ${{ needs.approve-pr.outputs.checkout_sha }}
      comparison_base_sha: ${{ needs.approve-pr.outputs.comparison_base_sha }}
      run_mode_override: pr
      pr_number: ${{ needs.approve-pr.outputs.pr_number }}
      trusted_reason: ${{ needs.approve-pr.outputs.trusted_reason }}
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      HCLOUD_SSH_KEY_ID: ${{ secrets.HCLOUD_SSH_KEY_ID }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
