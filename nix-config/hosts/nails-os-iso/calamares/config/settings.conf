# Calamares top-level configuration for NAILS OS.
#
# UI sequence:  welcome → locale → keyboard → partition → users → summary
# Exec sequence: partition → mount → nails-os (our custom module) → umount
#
# The "nails-os" exec module replaces the stock "nixos" module. It installs
# via our flake instead of generating a generic configuration.nix.
---
modules-search: [ local, "@calamares_nixos_extensions@/lib/calamares/modules", "@out@/lib/calamares/modules" ]

instances: []

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - tor-config
  - summary
- exec:
  - partition
  - mount
  - nails-os
  - umount
- show:
  - finished

branding: nails-os

prompt-install:              false
dont-chroot:                 false
oem-setup:                   false
disable-cancel:              false
disable-cancel-during-exec:  false
hide-back-and-next-during-exec: true
quit-at-end:                 false
