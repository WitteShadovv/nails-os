# Calamares partition module configuration for NAILS OS — BIOS/Legacy mode.
#
# MBR (DOS) partition table with a single LUKS1 ext4 partition.
# GRUB installs into the 1 MiB post-MBR gap and uses its cryptodisk module
# to unlock the LUKS1 container at boot.  /boot lives inside the encrypted
# ext4 at /persist/boot, accessed via a bind mount at runtime.
#
# LUKS1 (not LUKS2) is required here because NixOS's grub-install only
# embeds the luks (LUKS1) module — it never embeds luks2.mod regardless
# of the enableCryptodisk setting.  LUKS2 containers cannot be unlocked
# by GRUB in NixOS (open issue: nixpkgs#122449).
#
# Note: the user will be asked for the disk passphrase twice at boot —
# once by GRUB (to read the kernel/initrd) and once by the initrd (to
# mount /persist).  This is an inherent limitation of the GRUB+LUKS model.
---

# MBR avoids the need for a bios_grub partition.  GRUB installs to the MBR
# and uses the 1 MiB gap before the first partition for its stage 2.
initialPartitionTableType: msdos

userSwapChoices:
    - none

luksGeneration: luks1

defaultFileSystemType: "ext4"

availableFileSystemTypes:
    - ext4

# /boot is inside the LUKS container — not a separate plaintext partition.
showNotEncryptedBootMessage: false

# Single LUKS1 partition covering the entire disk.
partitionLayout:
    - name:       "root"
      filesystem: "ext4"
      mountPoint: "/"
      size:       100%
