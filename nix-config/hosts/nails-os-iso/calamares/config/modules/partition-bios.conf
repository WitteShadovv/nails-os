# Calamares partition module configuration for NAILS OS — BIOS/Legacy mode.
#
# Automated GPT layout:
#   - 1 MiB  unformatted  (bios_grub flag) — GRUB stage 1.5 embedding space
#   - 1 GiB  ext4         /boot            — GRUB-readable, unencrypted
#   - remainder LUKS2 ext4 /               — encrypted root
#
# GRUB 2 cannot unlock LUKS2 containers using the argon2id key derivation
# function (the LUKS2 default).  Keeping /boot unencrypted sidesteps this:
# GRUB reads kernels from plaintext /boot; the initrd handles LUKS unlock.
# See docs/SECURITY.md for the evil maid attack implications.
---
# No efi: block — we are not creating a FAT32 EFI system partition.

userSwapChoices:
    - none

luksGeneration: luks2

defaultFileSystemType: "ext4"

availableFileSystemTypes:
    - ext4

# Don't warn about unencrypted /boot — this is deliberate (see comment above).
showNotEncryptedBootMessage: false

# GPT partition layout for BIOS boot.
# NOTE: The bios_grub partition has no filesystem and is never mounted.
#       It provides the 1 MiB gap GRUB needs to embed its stage 1.5 code
#       on a GPT disk (where the traditional post-MBR gap is too small).
partitionLayout:
    - name:       "bios_boot"
      size:       1MiB
      filesystem: unformatted
      flags:      [ bios_grub ]

    - name:       "boot"
      size:       1GiB
      filesystem: "ext4"
      mountPoint: "/boot"
      noEncrypt:  true

    - name:       "root"
      filesystem: "ext4"
      noEncrypt:  false
      mountPoint: "/"
      size:       100%
