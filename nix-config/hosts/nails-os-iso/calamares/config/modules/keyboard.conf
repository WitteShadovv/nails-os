---
# Override upstream keyboard.conf to disable the GNOME gsettings apply call.
#
# The upstream config has `configure: gnome: true`, which causes the keyboard
# module to run `sudo gsettings set org.gnome.desktop.input-sources …` as
# uid 1000.  When Calamares runs as root (via /etc/calamares-launch), the
# user's D-Bus session bus at /run/user/1000/bus is not accessible and the
# sudo call hangs indefinitely, freezing the installer UI.
xOrgConfFileName: "/etc/X11/xorg.conf.d/00-keyboard.conf"
writeEtcDefaultKeyboard: false

configure:
    gnome: false
