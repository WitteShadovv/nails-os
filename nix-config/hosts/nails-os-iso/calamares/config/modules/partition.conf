# Calamares partition module configuration for NAILS OS.
#
# Defaults to an automated GPT layout:
#   - 1 GiB EFI system partition  (FAT32)
#   - remainder encrypted with LUKS2, formatted ext4, mounted at /
#
# The user may switch to manual partitioning in the UI if they want a
# different layout, but automated + encryption is the encouraged path.
---
efi:
    mountPoint:      "/boot"
    recommendedSize: 1GiB
    minimumSize:     512MiB
    label:           "EFI"

# No swap — matches the old installer and NAILS OS's no-persistence model.
userSwapChoices:
    - none

luksGeneration: luks2

defaultFileSystemType: "ext4"

availableFileSystemTypes:
    - ext4

# Don't warn when /boot is not encrypted; we deliberately keep EFI plain.
showNotEncryptedBootMessage: false

# Default automated layout: EFI (from the efi: block above) + LUKS2 root.
# NOTE: Do NOT add a separate boot/EFI entry here — the efi: block already
# creates the unencrypted FAT32 EFI partition.  A duplicate entry would cause
# Calamares to create a second boot partition and then LUKS-encrypt it (because
# luksGeneration is set globally), which breaks bootctl install.
partitionLayout:
    - name: "root"
      filesystem: "ext4"
      noEncrypt: false
      mountPoint: "/"
      size: 100%
