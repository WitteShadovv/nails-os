# Calamares users module configuration for NAILS OS.
#
# The installer collects a password for the "amnesia" user. The username
# field is shown but should be left as "amnesia" — our flake hardcodes that
# account. The password is picked up by the nails-os exec module and written
# to modules/secrets/amnesia.passwd so the flake can use it.
---
defaultGroups:
    - wheel
    - networkmanager
    - audio
    - video

setRootPassword:          false
doReusePassword:          false
doAutologin:              false

passwordRequirements:
    minLength: 8
    maxLength: 64
    libpwquality:
        - minlen=8
        - maxrepeat=3
        - maxsequence=3

allowWeakPasswords:        true
allowWeakPasswordsDefault: false

user:
    shell:           /run/current-system/sw/bin/bash
    forbidden_names: [ root ]

hostname:
    location:        EtcHosts
    writeHostsFile:  true
    forbidden_names: [ localhost ]
