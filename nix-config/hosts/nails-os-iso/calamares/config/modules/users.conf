# Calamares users module configuration for NAILS OS.
#
# The username is fixed to "amnesia" — the hardcoded account in the NixOS
# config. The field is shown as read-only so the user is not confused.
# Only the password, full name, and hostname are configurable.
---
defaultGroups:
    - wheel
    - networkmanager
    - audio
    - video

setRootPassword:          false
doReusePassword:          false
doAutologin:              false

passwordRequirements:
    minLength: 8
    maxLength: 64
    libpwquality:
        - minlen=8
        - maxrepeat=3
        - maxsequence=3

allowWeakPasswords:        true
allowWeakPasswordsDefault: false

user:
    shell:           /run/current-system/sw/bin/bash
    forbidden_names: [ root ]

hostname:
    location:        EtcHosts
    writeHostsFile:  true
    forbidden_names: [ localhost ]

# Lock the login name to "amnesia". The NixOS configuration hardcodes this
# account; allowing a different name would produce a broken install.
presets:
    loginName:
        value:    "amnesia"
        editable: false
