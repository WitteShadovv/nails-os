---
# Calamares packagechooser config for NAILS OS shell history selection.
# The user's choice is stored in GlobalStorage under key "packagechooser_historyconfig".
# The nails-os exec module reads this key to decide whether to enable shell history.

mode: required
method: legacy

labels:
  step: "Shell History"

default: disabled

items:
  - id: disabled
    packages: []
    name: "Disable shell history (recommended)"
    description: |
      Shell command history is not saved to disk. Commands you type in the
      terminal leave no trace after your session ends. This is the default
      and most private option.
    screenshot: ""

  - id: enabled
    packages: []
    name: "Enable shell history"
    description: |
      Shell commands are saved to history files (~/.bash_history, etc.).
      Convenient for recalling previous commands, but creates a persistent
      record of your terminal activity that could be recovered forensically.
    screenshot: ""
