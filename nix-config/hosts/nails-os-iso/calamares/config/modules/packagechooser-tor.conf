---
# Calamares packagechooser config for NAILS OS network routing selection.
# The user's choice is stored in GlobalStorage under key "packagechooser_packagechooser-tor".
# The nails-os exec module reads this key to decide whether to disable Tor.

mode: required
method: legacy

labels:
  step: "Network Routing"

default: tor

items:
  - id: tor
    packages: []
    name: "Use Tor network routing (recommended)"
    description: |
      TCP traffic is routed through Tor and DNS queries are resolved through
      Tor. Bundled bridges remain enabled in this mode. This is the default
      and most private option.
    screenshot: "/run/current-system/sw/share/calamares/branding/nails-os/icons/tor-onion.svg"

  - id: direct
    packages: []
    name: "Use direct network connection"
    description: |
      Tor and its transparent routing are disabled. Traffic goes directly to
      the internet and DNS is handled by Quad9 (9.9.9.9). Faster, but your IP
      address is visible to the network and to the sites you visit.
    screenshot: "/run/current-system/sw/share/calamares/branding/nails-os/icons/direct-globe.svg"
