---
# Calamares packagechooser config for NAILS OS network routing selection.
# The user's choice is stored in GlobalStorage under key "packagechooser_packagechooser-tor".
# The nails-os exec module reads this key to decide whether to disable Tor.

mode: required
method: legacy

labels:
  step: "Network Routing"

default: tor

items:
  - id: tor
    packages: []
    name: "Route all traffic through Tor (recommended)"
    description: |
      All network traffic is transparently routed through the Tor anonymity
      network. DNS queries are resolved through Tor. This is the default and
      most private option.
    screenshot: "/run/current-system/sw/share/calamares/branding/nails-os/icons/tor-onion.svg"

  - id: direct
    packages: []
    name: "Use direct network connection (cleartext)"
    description: |
      Traffic goes directly to the internet without Tor. DNS is handled by
      Quad9 (9.9.9.9). Faster, but your IP address is visible to every site
      you visit and your ISP can see which sites you connect to.
    screenshot: "/run/current-system/sw/share/calamares/branding/nails-os/icons/direct-globe.svg"
