---
# Calamares packagechooser config for NAILS OS home directory persistence.
# The user's choice is stored in GlobalStorage under key
# "packagechooser_homepersistenceconfig".
# The nails-os exec module reads this key to decide which directories to keep
# across reboots.

mode: required
method: legacy

labels:
  step: "Home Persistence"

default: selective

items:
  - id: selective
    packages: []
    name: "Selective persistence (recommended)"
    description: |
      Only your personal files and essential settings survive reboots.
      Persisted: Documents, Downloads, Music, Pictures, Videos, Desktop,
      GNOME settings, keyring (saved passwords), SSH keys, GPG keys.

      Left on RAM — wiped every reboot:
        • Recent files list (~/.local/share/recently-used.xbel)
        • File-manager metadata and thumbnails
        • File search index (GNOME Tracker)
        • Application caches (~/.cache/)
        • Full browser profiles (history, cookies, sessions)

      Recommended: maximises privacy while keeping your documents and keys.
    screenshot: ""

  - id: full
    packages: []
    name: "Full home persistence"
    description: |
      Your entire home directory (/home/amnesia) is saved across reboots.
      More convenient, but the following forensic artefacts will accumulate:
        • Recent files list — logs every file you open, with timestamps
        • Thumbnail cache — retains image previews even after deletion
        • File search index — stores a searchable copy of file contents
        • Application caches — may include browsing and usage history

      Choose this only if you need apps that store important data outside
      Documents/Downloads/etc. and you accept the privacy trade-off.
    screenshot: ""
