exclude: (hardware-configuration\.nix|flake\.lock)$

repos:
  - repo: local
    hooks:
      - id: cleanup-result
        name: cleanup build result symlinks
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - -c
          - |
            # Remove result symlinks created by nix build
            rm -f result result-*
            echo "✓ Cleaned up result symlinks"

      - id: nix-flake-update
        name: nix flake update and commit
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - -c
          - |
            echo "Updating flake.lock..."
            nix flake update ./nix-config
            git add nix-config/flake.lock

      - id: nixfmt
        name: nixfmt
        entry: nixfmt
        language: system
        files: \.nix$
        args: ["."]

      - id: nix-syntax-check
        name: nix syntax check
        entry: bash
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'
        args:
          - -c
          - 'for file in "$@"; do nix-instantiate --parse "$file" > /dev/null || exit 1; done'
          - --

      - id: deadnix
        name: deadnix (remove dead code)
        entry: deadnix
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'
        args: [--fail]

      - id: statix
        name: statix (nix linter)
        entry: bash
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'
        pass_filenames: false
        args:
          - -c
          - "statix check --ignore hardware-configuration.nix flake.lock"

      - id: nix-store-check
        name: check for store paths
        entry: bash
        language: system
        files: '.*\.nix$'
        exclude: '(.*/tmp-.*\.nix$)'
        args:
          - -c
          - 'for file in "$@"; do if grep "/nix/store" "$file"; then echo "Hard-coded store paths found in $file!"; exit 1; fi; done'
          - --

      - id: flake-lock-check
        name: flake.lock is up to date
        entry: bash
        language: system
        files: flake\.(nix|lock)$
        always_run: true
        pass_filenames: false
        args:
          - -c
          - "nix flake lock --no-update-lock-file ./nix-config"

      - id: detect-secrets
        name: detect secrets
        entry: detect-secrets-hook
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  # Check if builds last because it takes long
  # Only evaluates main configs (gaming, production), skips slow ISO evaluations
  - repo: local
    hooks:
      - id: nixos-config-check
        name: nixos config validation
        entry: bash
        language: system
        files: \.nix$
        pass_filenames: false
        args:
          - -c
          - "nix eval ./nix-config#nixosConfigurations.nails-os.config.system.build.toplevel.drvPath"
