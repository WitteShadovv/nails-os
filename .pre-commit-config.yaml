exclude: (hardware-configuration\.nix|flake\.lock)$

repos:
  - repo: local
    hooks:
      - id: cleanup-result
        name: cleanup build result symlinks
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - -c
          - |
            # Remove result symlinks created by nix build
            rm -f result result-*
            echo "✓ Cleaned up result symlinks"

      - id: tracked-cleanliness-guard
        name: guard tracked repository junk
        entry: python3 .github/scripts/check_tracked_cleanliness.py
        language: system
        pass_filenames: false
        always_run: true

      - id: nixfmt
        name: nixfmt
        entry: nix
        language: system
        files: \.nix$
        args:
          - develop
          - ./nix-config
          - -c
          - nixfmt

      - id: nix-syntax-check
        name: nix syntax check
        entry: bash
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'
        args:
          - -c
          - 'for file in "$@"; do nix-instantiate --parse "$file" > /dev/null || exit 1; done'
          - --

      - id: deadnix
        name: deadnix (remove dead code)
        entry: deadnix
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'
        args: [--fail]

      - id: statix
        name: statix (nix linter)
        entry: bash
        language: system
        files: \.nix$
        exclude: '.*/tmp-.*\.nix$'
        pass_filenames: false
        args:
          - -c
          - "statix check --ignore hardware-configuration.nix flake.lock"

      - id: nix-store-check
        name: check for store paths
        entry: bash
        language: system
        files: '.*\.nix$'
        exclude: '(.*/tmp-.*\.nix$)'
        args:
          - -c
          - 'for file in "$@"; do if grep -E "(/nix/store/[a-z0-9]{32}-|[\"\x27]/nix/store[\"\x27])" "$file"; then echo "Hard-coded store paths found in $file!"; exit 1; fi; done'
          - --

      - id: flake-lock-check
        name: flake.lock is up to date
        entry: bash
        language: system
        files: flake\.(nix|lock)$
        always_run: true
        pass_filenames: false
        args:
          - -c
          - "nix flake lock --no-update-lock-file ./nix-config"

      - id: ignored-cves-policy-check
        name: ignored CVEs policy shape check
        entry: python3
        language: system
        files: nix-config/security/ignored-cves\.json$
        pass_filenames: false
        args:
          - -c
          - |
            import json
            from pathlib import Path

            data = json.loads(Path("nix-config/security/ignored-cves.json").read_text())
            assert data.get("version") == 1, "version must be 1"
            entries = data.get("entries")
            assert isinstance(entries, list), "entries must be an array"
            for idx, item in enumerate(entries):
              assert isinstance(item.get("cve"), str), f"entries[{idx}].cve must be a string"
              assert isinstance(item.get("expires"), str), f"entries[{idx}].expires must be a string"
              assert isinstance(item.get("reason"), str), f"entries[{idx}].reason must be a string"

      - id: detect-secrets
        name: detect secrets
        entry: detect-secrets-hook
        language: system
        types: [text]
        args:
          - --exclude-secrets
          - '^(1de1a9ddba23464d037aea82a16ca6cc800e1b06eda67c8007560ab6c56afdb7|FB5DB77FD5C118B80511ADA8A6310ACC4672475C|2C6106201985B60E6C7AC87323F3D4EA75716059|7F38BBB59D064DBCB3D84D725612B36462313325|abcdefghijklmnopqrstuvwxyz0123456789-)$'
        exclude: '.*/tmp-.*\.nix$'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  # Check if builds last because it takes long
  # Only evaluates main configs (gaming, production), skips slow ISO evaluations
  - repo: local
    hooks:
      - id: nixos-config-check
        name: nixos config validation
        entry: bash
        language: system
        files: \.nix$
        pass_filenames: false
        args:
          - -c
          - "nix eval ./nix-config#nixosConfigurations.nails-os.config.system.build.toplevel.drvPath"
